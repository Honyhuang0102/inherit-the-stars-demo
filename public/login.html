<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepDivers Studio — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --bg-card: #111118;
      --border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-error: #f87171;
      --radius: 12px;
    }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    /* Background gradient */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% -20%, rgba(99,102,241,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      position: relative;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .logo-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: rgba(255,255,255,0.2); }
    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-error);
      margin-bottom: 16px;
      display: none;
    }
    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .footer-note a {
      color: var(--accent-hover);
      text-decoration: none;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">🌊</span>
      <div class="logo-title">DeepDivers Studio</div>
      <div class="logo-sub">Creator Platform</div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-primary" id="login-btn" onclick="doLogin()">Dive In →</button>

    <div class="divider">or</div>

    <div class="footer-note">
      Don't have an account?<br>
      <a href="https://infidive.ai" target="_blank">Sign up on the infidive app</a>
    </div>
  </div>

  <script>
    const INFIDIVE_API = 'https://infidive.ai/api/v1';

    // Already logged in?
    (function() {
      const token = localStorage.getItem('dd_token');
      if (token) location.href = '/dashboard';
    })();

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('error-msg').style.display = 'none';
    }

    async function doLogin() {
      hideError();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(INFIDIVE_API + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const body = await res.json();

        if (!res.ok) {
          showError(body.error || 'Invalid email or password.');
          return;
        }

        // infidive returns { data: { accessToken, refreshToken, user } }
        const d = body.data || body;
        const accessToken = d.accessToken || d.access_token || '';
        const refreshToken = d.refreshToken || d.refresh_token || '';
        const user = d.user || {};

        if (!accessToken) { showError('Login failed — no token received.'); return; }

        localStorage.setItem('dd_token', accessToken);
        localStorage.setItem('dd_refresh_token', refreshToken);
        localStorage.setItem('dd_user', JSON.stringify({ id: user.id, email: user.email, username: user.username }));

        location.href = '/dashboard';
      } catch(e) {
        showError('Network error — please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Dive In →';
      }
    }
  </script>
</body>
</html>
