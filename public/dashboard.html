<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepDivers Studio — Dashboard</title>
<link rel="icon" type="image/png" href="/favicon.png" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --bg-card: #111118;
      --bg-hover: #16161f;
      --border: rgba(255,255,255,0.08);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-tertiary: #64748b;
      --danger: #ef4444;
      --radius: 12px;
    }
    body { background: var(--bg); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9); backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; }
    .header-logo span { font-size: 22px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-badge { font-size: 13px; color: var(--text-secondary); }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 6px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Main content ── */
    main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
    }
    .section-title { font-size: 20px; font-weight: 700; }
    .btn-new {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.2s;
    }
    .btn-new:hover { background: var(--accent-hover); }

    /* ── Project Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .proj-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer; position: relative;
    }
    .proj-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); }
    .proj-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, #1e1e2e, #2a2a3e);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--text-tertiary);
      overflow: hidden; position: relative;
    }
    .proj-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .proj-body { padding: 14px 16px 12px; }
    .proj-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .proj-meta { font-size: 12px; color: var(--text-tertiary); display: flex; gap: 12px; }
    .proj-actions {
      display: flex; gap: 8px; padding: 0 16px 14px;
      border-top: 1px solid var(--border); padding-top: 12px;
    }
    .btn-edit {
      flex: 1; background: var(--accent); color: #fff; border: none;
      padding: 7px; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-edit:hover { background: var(--accent-hover); }
    .btn-more {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-secondary); padding: 7px 12px;
      border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.2s;
      position: relative;
    }
    .btn-more:hover { background: rgba(255,255,255,0.1); }

    /* ── New project card ── */
    .new-card {
      background: var(--bg-card); border: 2px dashed var(--border);
      border-radius: var(--radius); aspect-ratio: auto;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 40px 20px;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      min-height: 180px;
    }
    .new-card:hover { border-color: var(--accent); background: rgba(99,102,241,0.05); }
    .new-card-icon { font-size: 28px; color: var(--text-tertiary); }
    .new-card-label { font-size: 13px; color: var(--text-tertiary); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center; padding: 80px 20px; color: var(--text-tertiary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; margin-bottom: 24px; }

    /* ── Dropdown menu ── */
    .dropdown {
      position: absolute; bottom: calc(100% + 6px); right: 0;
      background: #1c1c28; border: 1px solid var(--border);
      border-radius: 10px; min-width: 170px; z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      overflow: hidden; display: none;
    }
    .dropdown.show { display: block; }
    .dropdown-item {
      padding: 10px 14px; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      transition: background 0.15s; color: var(--text-primary);
    }
    .dropdown-item:hover { background: rgba(255,255,255,0.06); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item.danger:hover { background: rgba(239,68,68,0.1); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; backdrop-filter: blur(4px);
    }
    .modal { background: #16161f; border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 360px; }
    .modal h3 { font-size: 16px; margin-bottom: 16px; }
    .modal input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: 14px;
      color: var(--text-primary); outline: none; margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn-confirm { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-confirm:hover { background: var(--accent-hover); }
    .btn-confirm.danger { background: var(--danger); }
    .btn-confirm.danger:hover { background: #dc2626; }

    .loading { text-align: center; padding: 60px; color: var(--text-tertiary); font-size: 14px; }
  </style>
</head>
<body>
  <header>
    <div class="header-logo"><span>🌊</span> DeepDivers Studio</div>
    <div class="header-right">
      <div class="user-badge" id="user-badge"></div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <div class="section-header">
      <div class="section-title">My Projects</div>
      <button class="btn-new" onclick="showNewModal()">＋ New Project</button>
    </div>
    <div id="grid-container" class="loading">Loading projects...</div>
  </main>

  <!-- New / Rename modal -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">New Project</h3>
      <input type="text" id="modal-input" placeholder="Project title..." maxlength="60" />
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-confirm" id="modal-confirm" onclick="modalConfirm()">Create</button>
      </div>
    </div>
  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay" id="confirm-modal" style="display:none" onclick="closeConfirm(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="confirm-title">Delete project?</h3>
      <p id="confirm-msg" style="font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;"></p>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm danger" id="confirm-ok" onclick="confirmAction()">Delete</button>
      </div>
    </div>
  </div>

<script>
const API = '';  // same origin
let _token = '';
let _projects = [];
let _modalMode = ''; // 'new' | 'rename'
let _modalTargetId = '';
let _confirmCb = null;

// ── Auth ───────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('dd_token') || ''; }
function authHeaders() { return { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' }; }

async function refreshToken() {
  const rt = localStorage.getItem('dd_refresh_token');
  if (!rt) return false;
  try {
    const r = await fetch('https://infidive.ai/api/v1/auth/refresh', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ refresh_token: rt })
    });
    if (!r.ok) return false;
    const d = await r.json();
    const t = (d.data || d).accessToken || (d.data || d).access_token;
    if (t) { localStorage.setItem('dd_token', t); return true; }
    return false;
  } catch(e) { return false; }
}

async function apiFetch(url, opts = {}) {
  let r = await fetch(API + url, { ...opts, headers: authHeaders() });
  if (r.status === 401) {
    const refreshed = await refreshToken();
    if (refreshed) r = await fetch(API + url, { ...opts, headers: authHeaders() });
    else { logout(); return null; }
  }
  return r;
}

function logout() {
  localStorage.removeItem('dd_token');
  localStorage.removeItem('dd_refresh_token');
  localStorage.removeItem('dd_user');
  location.href = '/login';
}

// ── Init ───────────────────────────────────────────────────────────
(function init() {
  const token = getToken();
  if (!token) { location.href = '/login'; return; }
  const user = JSON.parse(localStorage.getItem('dd_user') || '{}');
  document.getElementById('user-badge').textContent = user.username || user.email || 'Creator';
  loadProjects();
})();

// ── Load projects ──────────────────────────────────────────────────
async function loadProjects() {
  const r = await apiFetch('/api/projects');
  if (!r) return;
  if (!r.ok) { document.getElementById('grid-container').textContent = 'Failed to load projects.'; return; }
  const body = await r.json();
  _projects = body.data || [];
  renderGrid();
}

function renderGrid() {
  const container = document.getElementById('grid-container');
  container.className = 'grid';
  if (_projects.length === 0) {
    container.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">🌊</div>
      <p>No projects yet. Create your first one!</p>
    </div>
    <div class="new-card" onclick="showNewModal()">
      <div class="new-card-icon">＋</div>
      <div class="new-card-label">New Project</div>
    </div>`;
    return;
  }
  container.innerHTML = _projects.map(p => projectCard(p)).join('') +
    `<div class="new-card" onclick="showNewModal()">
      <div class="new-card-icon">＋</div>
      <div class="new-card-label">New Project</div>
    </div>`;
}

function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  return d + 'd ago';
}

function projectCard(p) {
  const thumb = p.thumbnail
    ? `<img src="${p.thumbnail}" alt="" onerror="this.style.display='none'">`
    : '🎬';
  return `<div class="proj-card">
    <div class="proj-thumb">${thumb}</div>
    <div class="proj-body">
      <div class="proj-title" title="${escHtml(p.title)}">${escHtml(p.title)}</div>
      <div class="proj-meta">
        <span>⬡ ${p.node_count || 0} nodes</span>
        <span>🕐 ${relativeTime(p.updated_at)}</span>
      </div>
    </div>
    <div class="proj-actions">
      <button class="btn-edit" onclick="openEditor('${p.id}')">Edit</button>
      <button class="btn-more" id="more-${p.id}" onclick="toggleMenu(event,'${p.id}')">⋯
        <div class="dropdown" id="menu-${p.id}">
          <div class="dropdown-item" onclick="renameProject('${p.id}','${escHtml(p.title)}')">✏️ Rename</div>
          <div class="dropdown-item" onclick="duplicateProject('${p.id}')">📋 Duplicate</div>
          <div class="dropdown-item danger" onclick="deleteProject('${p.id}','${escHtml(p.title)}')">🗑️ Delete</div>
        </div>
      </button>
    </div>
  </div>`;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function openEditor(id) { location.href = '/editor?project=' + id; }

// ── Dropdown ───────────────────────────────────────────────────────
let _openMenu = null;
function toggleMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  if (_openMenu && _openMenu !== menu) _openMenu.classList.remove('show');
  menu.classList.toggle('show');
  _openMenu = menu.classList.contains('show') ? menu : null;
}
document.addEventListener('click', () => { if (_openMenu) { _openMenu.classList.remove('show'); _openMenu = null; } });

// ── Modals ─────────────────────────────────────────────────────────
function showNewModal() {
  _modalMode = 'new'; _modalTargetId = '';
  document.getElementById('modal-title').textContent = 'New Project';
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-confirm').textContent = 'Create';
  document.getElementById('modal-confirm').className = 'btn-confirm';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}
function renameProject(id, currentTitle) {
  if (_openMenu) { _openMenu.classList.remove('show'); _openMenu = null; }
  _modalMode = 'rename'; _modalTargetId = id;
  document.getElementById('modal-title').textContent = 'Rename Project';
  document.getElementById('modal-input').value = currentTitle;
  document.getElementById('modal-confirm').textContent = 'Rename';
  document.getElementById('modal-confirm').className = 'btn-confirm';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => { const inp = document.getElementById('modal-input'); inp.focus(); inp.select(); }, 50);
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').style.display = 'none';
}
document.getElementById('modal-input').addEventListener('keydown', e => { if(e.key==='Enter') modalConfirm(); });

async function modalConfirm() {
  const title = document.getElementById('modal-input').value.trim();
  if (!title) return;
  document.getElementById('modal-confirm').disabled = true;
  if (_modalMode === 'new') {
    const r = await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify({ title }) });
    if (!r) return;
    const body = await r.json();
    if (r.ok) { document.getElementById('modal').style.display = 'none'; location.href = '/editor?project=' + body.data.id; }
    else alert(body.error || 'Failed to create project.');
  } else if (_modalMode === 'rename') {
    const r = await apiFetch('/api/projects/' + _modalTargetId, { method: 'PUT', body: JSON.stringify({ title }) });
    if (!r) return;
    if (r.ok) {
      document.getElementById('modal').style.display = 'none';
      const p = _projects.find(x => x.id === _modalTargetId);
      if (p) p.title = title;
      renderGrid();
    } else alert('Failed to rename.');
  }
  document.getElementById('modal-confirm').disabled = false;
}

// ── Delete / Duplicate ─────────────────────────────────────────────
function deleteProject(id, title) {
  if (_openMenu) { _openMenu.classList.remove('show'); _openMenu = null; }
  document.getElementById('confirm-title').textContent = 'Delete project?';
  document.getElementById('confirm-msg').textContent = `"${title}" will be permanently deleted. This cannot be undone.`;
  document.getElementById('confirm-ok').textContent = 'Delete';
  _confirmCb = async () => {
    const r = await apiFetch('/api/projects/' + id, { method: 'DELETE' });
    if (!r) return;
    if (r.ok) { _projects = _projects.filter(p => p.id !== id); renderGrid(); }
    else alert('Failed to delete.');
  };
  document.getElementById('confirm-modal').style.display = 'flex';
}

async function duplicateProject(id) {
  if (_openMenu) { _openMenu.classList.remove('show'); _openMenu = null; }
  const r = await apiFetch('/api/projects/' + id + '/duplicate', { method: 'POST', body: '{}' });
  if (!r) return;
  const body = await r.json();
  if (r.ok) { _projects.unshift(body.data); renderGrid(); }
  else alert('Failed to duplicate.');
}

function closeConfirm(e) {
  if (e && e.target !== document.getElementById('confirm-modal')) return;
  document.getElementById('confirm-modal').style.display = 'none';
  _confirmCb = null;
}
async function confirmAction() {
  if (_confirmCb) { await _confirmCb(); _confirmCb = null; }
  document.getElementById('confirm-modal').style.display = 'none';
}
</script>
</body>
</html>
