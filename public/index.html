<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>STELLAR HEIR · 星之继承者</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:        #050810;
      --clr-surface:   #0a0e1a;
      --clr-border:    #1c2a3a;
      --clr-accent:    #00d4ff;
      --clr-accent2:   #ff6b35;
      --clr-text:      #c8d8e8;
      --clr-text-dim:  #4a6070;
      --clr-danger:    #ff3b5c;
      --clr-success:   #00ff9d;
      --font-mono:     'Courier New', Courier, monospace;
      --phone-w:       390px;
      --phone-h:       844px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Phone Shell ──────────────────────────────────────────────────────── */
    #phone-shell {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #0d1520,
        0 0 60px rgba(0, 212, 255, 0.08),
        0 30px 80px rgba(0,0,0,0.9);
    }

    /* Notch */
    #phone-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }

    /* Scanline overlay */
    #phone-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 90;
    }

    /* ── HUD Header ───────────────────────────────────────────────────────── */
    #hud-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      padding: 30px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(5,8,16,0.95) 60%, transparent);
    }

    #hud-title {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--clr-accent);
      text-transform: uppercase;
    }

    #hud-status {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
    }

    #hud-status .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--clr-success);
      margin-right: 5px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Video Container ──────────────────────────────────────────────────── */
    /*
     * 所有动态创建的 <video> 都被注入到此容器中。
     * 活跃视频 class="vid-active"，预加载视频 class="vid-preload"（隐藏）。
     */
    #video-container {
      position: absolute;
      inset: 0;
      background: #000;
    }

    /* 活跃视频：铺满容器，可见 */
    #video-container .vid-active {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      transition: opacity 0.25s ease;
      z-index: 1;
    }

    /* 预加载视频：完全隐藏，不占布局，静音，后台拉流 */
    #video-container .vid-preload {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      /* 仍在 DOM 中，浏览器会继续缓冲 */
    }

    /* 切换时的淡出过渡辅助 */
    #video-container .vid-fadeout {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Corner Brackets (decorative) ────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      z-index: 60;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--clr-accent);
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }

    .corner-tl { top: 60px; left: 16px; }
    .corner-tl::before { top: 0; left: 0; }
    .corner-tl::after  { top: 0; left: 0; }

    .corner-tr { top: 60px; right: 16px; }
    .corner-tr::before { top: 0; right: 0; left: auto; }
    .corner-tr::after  { top: 0; right: 0; left: auto; }

    .corner-bl { bottom: 80px; left: 16px; }
    .corner-bl::before { bottom: 0; top: auto; left: 0; }
    .corner-bl::after  { bottom: 0; top: auto; left: 0; }

    .corner-br { bottom: 80px; right: 16px; }
    .corner-br::before { bottom: 0; top: auto; right: 0; left: auto; }
    .corner-br::after  { bottom: 0; top: auto; right: 0; left: auto; }

    /* ── Choice Overlay ───────────────────────────────────────────────────── */
    #choice-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 14px;
      z-index: 70;
      background: rgba(5, 8, 16, 0.72);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #choice-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .choice-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .choice-header .prompt-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--clr-text-dim);
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .choice-header .prompt-title {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--clr-text);
    }

    /* Divider line */
    .choice-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--clr-accent), transparent);
      margin: 4px 0;
    }

    /* Preload status badge */
    .preload-badge {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
      margin-top: -6px;
    }

    .preload-badge .badge-ready {
      color: var(--clr-success);
    }

    /* Choice Buttons */
    .choice-btn {
      position: relative;
      width: 280px;
      padding: 14px 20px;
      background: rgba(0, 212, 255, 0.04);
      border: 1px solid rgba(0, 212, 255, 0.35);
      color: var(--clr-text);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      overflow: hidden;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.08) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .choice-btn:hover::before { opacity: 1; }

    .choice-btn:hover {
      border-color: var(--clr-accent);
      color: #fff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.05);
      transform: translateX(4px);
    }

    .choice-btn:active {
      transform: translateX(2px) scale(0.98);
    }

    .choice-btn .btn-label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: var(--clr-accent);
      margin-bottom: 4px;
    }

    .choice-btn .btn-sublabel {
      display: block;
      font-size: 9px;
      color: var(--clr-text-dim);
      letter-spacing: 0.05em;
    }

    .choice-btn .btn-hotkey {
      position: absolute;
      top: 8px; right: 12px;
      font-size: 8px;
      color: var(--clr-text-dim);
      letter-spacing: 0.1em;
    }

    /* Ready indicator on button */
    .choice-btn .btn-ready-dot {
      position: absolute;
      bottom: 8px; right: 12px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--clr-text-dim);
      transition: background 0.3s ease;
    }

    .choice-btn.is-ready .btn-ready-dot {
      background: var(--clr-success);
      box-shadow: 0 0 6px var(--clr-success);
    }

    /* ── HUD Footer ───────────────────────────────────────────────────────── */
    #hud-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      padding: 0 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 50;
      background: linear-gradient(to top, rgba(5,8,16,0.95) 60%, transparent);
    }

    #node-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
      text-transform: uppercase;
    }

    #time-display {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
      font-variant-numeric: tabular-nums;
    }

    /* ── Loading Screen ───────────────────────────────────────────────────── */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo {
      text-align: center;
    }

    .loading-logo .logo-en {
      font-size: 11px;
      letter-spacing: 0.5em;
      color: var(--clr-accent);
      display: block;
      margin-bottom: 6px;
    }

    .loading-logo .logo-zh {
      font-size: 18px;
      letter-spacing: 0.3em;
      color: var(--clr-text);
      display: block;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: var(--clr-border);
      position: relative;
      overflow: hidden;
    }

    .loading-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--clr-accent);
      animation: loading-fill 1.4s ease forwards;
      box-shadow: 0 0 8px var(--clr-accent);
    }

    @keyframes loading-fill {
      to { width: 100%; }
    }

    .loading-text {
      font-size: 8px;
      letter-spacing: 0.3em;
      color: var(--clr-text-dim);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Ending Screen ────────────────────────────────────────────────────── */
    #ending-screen {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #ending-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ending-tag {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--clr-accent2);
      text-transform: uppercase;
    }

    .ending-title {
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--clr-text);
      text-align: center;
      padding: 0 30px;
    }

    .ending-desc {
      font-size: 10px;
      line-height: 1.8;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 40px;
      letter-spacing: 0.05em;
    }

    .ending-divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--clr-accent2), transparent);
    }

    .restart-btn {
      margin-top: 10px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid rgba(255, 107, 53, 0.4);
      color: var(--clr-accent2);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .restart-btn:hover {
      background: rgba(255, 107, 53, 0.1);
      border-color: var(--clr-accent2);
      box-shadow: 0 0 16px rgba(255, 107, 53, 0.2);
    }

    /* ── Error Screen ─────────────────────────────────────────────────────── */
    #error-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 300;
    }

    #error-screen.visible { display: flex; }

    .error-code {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--clr-danger);
    }

    .error-msg {
      font-size: 11px;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 30px;
    }

    /* ── Responsive: full-screen on real mobile ───────────────────────────── */
    @media (max-width: 430px) {
      #phone-shell {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>

<div id="phone-shell">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">
      <span class="logo-en">STELLAR HEIR</span>
      <span class="logo-zh">星之继承者</span>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
    <span class="loading-text">INITIALIZING SYSTEM ···</span>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <span class="error-code">ERR · DATA_LINK_FAILURE</span>
    <p class="error-msg">无法连接至游戏数据服务器<br>请确认后端服务已启动</p>
  </div>

  <!-- HUD Header -->
  <div id="hud-header">
    <span id="hud-title">STELLAR HEIR</span>
    <span id="hud-status"><span class="dot"></span>SYS ONLINE</span>
  </div>

  <!-- Corner Brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Video Container — 所有 <video> 实例动态注入此处 -->
  <div id="video-container"></div>

  <!-- Choice Overlay -->
  <div id="choice-overlay">
    <div class="choice-header">
      <span class="prompt-label">DECISION REQUIRED · 决策时刻</span>
      <span class="prompt-title">你将如何选择？</span>
    </div>
    <div class="choice-divider"></div>
    <div id="choices-container"></div>
    <div class="preload-badge" id="preload-badge"></div>
  </div>

  <!-- Ending Screen -->
  <div id="ending-screen">
    <span class="ending-tag" id="ending-tag-text"></span>
    <div class="ending-divider"></div>
    <h2 class="ending-title" id="ending-title-text"></h2>
    <p class="ending-desc" id="ending-desc-text"></p>
    <div class="ending-divider"></div>
    <button class="restart-btn" id="restart-btn">[ RESTART · 重新开始 ]</button>
  </div>

  <!-- HUD Footer -->
  <div id="hud-footer">
    <span id="node-label">NODE ···</span>
    <span id="time-display">00:00</span>
  </div>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
//  STELLAR HEIR · Video Pool Engine v2.0
//  架构：多视频实例池（Video Pool）+ 无缝预加载（Seamless Preloading）
//
//  核心数据结构：
//    videoPool  Map<nodeId, HTMLVideoElement>
//      - 每个节点对应一个独立的 <video> 实例
//      - 当前播放节点的实例：class="vid-active"，unmuted，可见
//      - 预加载节点的实例：class="vid-preload"，muted，隐藏，后台缓冲
//
//  生命周期：
//    1. loadNode(nodeId)
//       → 从 pool 取出或创建目标 <video>
//       → 激活（unmute + display + play）
//       → 立即对该节点的所有 choices 目标发起 preloadNode()
//    2. preloadNode(nodeId)
//       → 若 pool 中已存在则跳过（已在缓冲）
//       → 创建隐藏 <video preload="auto" muted>，注入 DOM，开始后台拉流
//    3. handleChoice(choice)
//       → 直接从 pool 取出已预加载的 <video>
//       → 无需任何网络等待，立即 display + unmute + play → 无缝秒切
//    4. releaseStaleVideos(keepIds)
//       → 遍历 pool，pause + removeAttribute('src') + remove() 不在 keepIds 中的实例
//       → 防止内存泄漏
// ══════════════════════════════════════════════════════════════════════════════

// ── DOM Refs ───────────────────────────────────────────────────────────────────
const $loadingScreen    = document.getElementById('loading-screen');
const $errorScreen      = document.getElementById('error-screen');
const $videoContainer   = document.getElementById('video-container');
const $choiceOverlay    = document.getElementById('choice-overlay');
const $choicesContainer = document.getElementById('choices-container');
const $preloadBadge     = document.getElementById('preload-badge');
const $endingScreen     = document.getElementById('ending-screen');
const $endingTag        = document.getElementById('ending-tag-text');
const $endingTitle      = document.getElementById('ending-title-text');
const $endingDesc       = document.getElementById('ending-desc-text');
const $restartBtn       = document.getElementById('restart-btn');
const $nodeLabel        = document.getElementById('node-label');
const $timeDisplay      = document.getElementById('time-display');

// ── Engine State ───────────────────────────────────────────────────────────────
const engine = {
  gameData:      null,   // 完整 JSON 数据
  currentNodeId: null,   // 当前活跃节点 ID
  activeVideo:   null,   // 当前活跃 <video> 元素引用
  choiceShown:   false,  // 是否已弹出选项
  branchHandled: false,  // 是否已触发分支（防重入）
  transitioning: false,  // 是否正在切换节点（防重复点击）
};

// ── Video Pool ─────────────────────────────────────────────────────────────────
// Map<nodeId: string, video: HTMLVideoElement>
const videoPool = new Map();

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function hideLoading() {
  $loadingScreen.classList.add('hidden');
}

function showError() {
  $errorScreen.classList.add('visible');
  hideLoading();
}

// ── Fetch Game Data ────────────────────────────────────────────────────────────
async function fetchGameData() {
  try {
    const res = await fetch('/api/game-data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('[VideoPool] fetchGameData failed:', err);
    return null;
  }
}

// ── Create a Video Element ─────────────────────────────────────────────────────
/**
 * 工厂函数：创建一个标准化的 <video> 实例并注入 video-container。
 * @param {string} nodeId   - 对应的节点 ID（用于 data 属性追踪）
 * @param {string} url      - 视频 URL
 * @param {boolean} hidden  - true = 预加载模式（隐藏）；false = 活跃模式（可见）
 * @returns {HTMLVideoElement}
 */
function createVideoElement(nodeId, url, hidden) {
  const v = document.createElement('video');
  v.dataset.nodeId  = nodeId;
  v.src             = url;
  v.preload         = 'auto';          // 立即开始缓冲
  v.playsInline     = true;
  v.setAttribute('webkit-playsinline', '');
  v.muted           = true;            // 初始静音（绕过自动播放策略）
  v.className       = hidden ? 'vid-preload' : 'vid-active';

  v.addEventListener('error', (e) => {
    console.error(`[VideoPool] Video error on node ${nodeId}:`, e);
  });

  $videoContainer.appendChild(v);

  // 立即触发加载（某些浏览器需要显式 load()）
  v.load();

  console.log(`[VideoPool] Created <video> for node="${nodeId}" hidden=${hidden}`);
  return v;
}

// ── Preload Node ───────────────────────────────────────────────────────────────
/**
 * 后台预加载目标节点的视频。若 pool 中已存在则跳过。
 * @param {string} nodeId
 */
function preloadNode(nodeId) {
  if (videoPool.has(nodeId)) {
    console.log(`[VideoPool] Preload skip (already in pool): ${nodeId}`);
    return;
  }

  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.warn(`[VideoPool] Preload target not found: ${nodeId}`);
    return;
  }

  const v = createVideoElement(nodeId, node.video_url, true /* hidden */);
  videoPool.set(nodeId, v);
  console.log(`[VideoPool] Preloading started: ${nodeId} → ${node.video_url}`);

  // 当视频缓冲到可以流畅播放时，更新选项按钮的就绪指示灯
  v.addEventListener('canplaythrough', () => {
    console.log(`[VideoPool] Preload ready: ${nodeId}`);
    markChoiceReady(nodeId);
    updatePreloadBadge();
  }, { once: true });
}

// ── Release Stale Videos ───────────────────────────────────────────────────────
/**
 * 内存管理：从 pool 中移除不再需要的视频实例，释放浏览器内存。
 * @param {Set<string>} keepIds - 需要保留的节点 ID 集合
 */
function releaseStaleVideos(keepIds) {
  for (const [nodeId, v] of videoPool.entries()) {
    if (!keepIds.has(nodeId)) {
      console.log(`[VideoPool] Releasing stale video: ${nodeId}`);
      v.pause();
      v.removeAttribute('src');  // 断开资源引用，触发 GC
      v.load();                  // 强制浏览器释放缓冲区
      v.remove();                // 从 DOM 移除
      videoPool.delete(nodeId);
    }
  }
}

// ── Activate Video ─────────────────────────────────────────────────────────────
/**
 * 将 pool 中的视频从预加载状态切换为活跃状态（无缝秒切核心）。
 * @param {HTMLVideoElement} v
 */
function activateVideo(v) {
  v.className = 'vid-active';
  v.muted     = false;   // 恢复声音
  v.currentTime = 0;     // 从头播放
  return v.play().catch(err => {
    // 若自动播放仍被拦截（极少数情况），保持 muted 重试
    console.warn('[VideoPool] Unmuted play blocked, retrying muted:', err.message);
    v.muted = true;
    return v.play().catch(() => {});
  });
}

// ── Deactivate Video ───────────────────────────────────────────────────────────
/**
 * 将当前活跃视频切换为淡出状态，然后移除。
 * @param {HTMLVideoElement} v
 */
function deactivateVideo(v) {
  v.className = 'vid-fadeout';
  v.pause();
  // 等待 CSS transition 结束后再从 DOM 移除（250ms）
  setTimeout(() => {
    if (v.parentNode) {
      v.pause();
      v.removeAttribute('src');
      v.load();
      v.remove();
    }
  }, 260);
}

// ── Load Node (Main Entry) ─────────────────────────────────────────────────────
/**
 * 加载并播放指定节点：
 *   1. 从 pool 取出预加载好的 <video>（或新建）
 *   2. 激活（unmute + play）
 *   3. 立即对所有 choices 目标发起预加载
 *   4. 释放不再需要的旧视频
 * @param {string} nodeId
 */
async function loadNode(nodeId) {
  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.error('[VideoPool] loadNode: node not found:', nodeId);
    return;
  }

  engine.currentNodeId = nodeId;
  engine.choiceShown   = false;
  engine.branchHandled = false;
  engine.transitioning = false;

  // 重置 UI
  $choiceOverlay.classList.remove('visible');
  $endingScreen.classList.remove('visible');
  $choicesContainer.innerHTML = '';
  $preloadBadge.innerHTML     = '';
  $nodeLabel.textContent = `NODE · ${nodeId.replace('_', ' ')}`;

  // ── 步骤 1：获取或创建目标视频 ──────────────────────────────────────────
  let targetVideo;
  if (videoPool.has(nodeId)) {
    // 命中预加载缓存 → 无缝秒切！
    targetVideo = videoPool.get(nodeId);
    console.log(`[VideoPool] Cache HIT for ${nodeId} — seamless switch!`);
  } else {
    // 未命中（首次加载或 restart）→ 新建并立即播放
    targetVideo = createVideoElement(nodeId, node.video_url, false);
    videoPool.set(nodeId, targetVideo);
    console.log(`[VideoPool] Cache MISS for ${nodeId} — cold start`);
  }

  // ── 步骤 2：淡出旧视频，激活新视频 ─────────────────────────────────────
  if (engine.activeVideo && engine.activeVideo !== targetVideo) {
    deactivateVideo(engine.activeVideo);
  }

  engine.activeVideo = targetVideo;
  await activateVideo(targetVideo);

  // 绑定 timeupdate（每次激活后重新绑定，避免多实例事件冲突）
  targetVideo.addEventListener('timeupdate', onTimeUpdate);
  targetVideo.addEventListener('seeked',     onSeeked);
  targetVideo.addEventListener('ended',      onEnded);

  // ── 步骤 3：立即预加载所有分支目标 ──────────────────────────────────────
  const targetIds = new Set([nodeId]);
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach(choice => {
      targetIds.add(choice.target_node);
      preloadNode(choice.target_node);
    });
  }

  // ── 步骤 4：释放不在保留集合中的旧视频（内存管理）────────────────────
  releaseStaleVideos(targetIds);
}

// ── timeupdate Handler ─────────────────────────────────────────────────────────
function onTimeUpdate() {
  // 只响应当前活跃视频的事件
  if (this !== engine.activeVideo) return;

  const t = this.currentTime;
  $timeDisplay.textContent = formatTime(t);
  maybeTriggerBranch(t);
}

// ── seeked Handler ─────────────────────────────────────────────────────────────
function onSeeked() {
  if (this !== engine.activeVideo) return;
  maybeTriggerBranch(this.currentTime);
}

// ── ended Handler ─────────────────────────────────────────────────────────────
function onEnded() {
  if (this !== engine.activeVideo) return;
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (node && node.type === 'ending') {
    showEnding(node);
  }
}

// ── Branch Trigger ─────────────────────────────────────────────────────────────
function maybeTriggerBranch(currentTime) {
  if (engine.branchHandled || engine.choiceShown) return;

  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node || node.type !== 'branching') return;

  const branchAt = Number(node.branch_at_second);
  if (!Number.isFinite(branchAt)) return;

  if (currentTime >= branchAt) {
    engine.branchHandled = true;
    showChoices(node);
  }
}

// ── Show Choices ───────────────────────────────────────────────────────────────
function showChoices(node) {
  if (engine.choiceShown) return;
  engine.choiceShown = true;

  engine.activeVideo.pause();
  $choicesContainer.innerHTML = '';

  node.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.dataset.targetNode = choice.target_node;
    btn.innerHTML = `
      <span class="btn-hotkey">KEY ${choice.hotkey}</span>
      <span class="btn-label">${choice.label}</span>
      <span class="btn-sublabel">${choice.sublabel}</span>
      <span class="btn-ready-dot"></span>
    `;
    btn.addEventListener('click', () => handleChoice(choice));
    $choicesContainer.appendChild(btn);

    // 若对应视频已在 pool 中且已可播放，立即标记就绪
    const preloadedVid = videoPool.get(choice.target_node);
    if (preloadedVid && preloadedVid.readyState >= 4) {
      btn.classList.add('is-ready');
    }
  });

  $choiceOverlay.classList.add('visible');
  updatePreloadBadge();
}

// ── Mark Choice Ready ──────────────────────────────────────────────────────────
function markChoiceReady(nodeId) {
  const btn = $choicesContainer.querySelector(`[data-target-node="${nodeId}"]`);
  if (btn) btn.classList.add('is-ready');
}

// ── Preload Badge ──────────────────────────────────────────────────────────────
function updatePreloadBadge() {
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node || !node.choices) return;

  const total  = node.choices.length;
  const ready  = node.choices.filter(c => {
    const v = videoPool.get(c.target_node);
    return v && v.readyState >= 4;
  }).length;

  if (ready === total && total > 0) {
    $preloadBadge.innerHTML = `<span class="badge-ready">▶ ALL STREAMS CACHED · 无缝切换就绪</span>`;
  } else {
    $preloadBadge.textContent = `PRELOADING ${ready}/${total} STREAMS ···`;
  }
}

// ── Handle Choice ──────────────────────────────────────────────────────────────
function handleChoice(choice) {
  if (engine.transitioning) return;
  engine.transitioning = true;

  $choiceOverlay.classList.remove('visible');

  // 移除旧视频的事件监听（防止事件泄漏到新节点）
  if (engine.activeVideo) {
    engine.activeVideo.removeEventListener('timeupdate', onTimeUpdate);
    engine.activeVideo.removeEventListener('seeked',     onSeeked);
    engine.activeVideo.removeEventListener('ended',      onEnded);
  }

  // 直接切换到预加载好的视频（无黑屏等待）
  loadNode(choice.target_node);
}

// ── Show Ending ────────────────────────────────────────────────────────────────
function showEnding(node) {
  $endingTag.textContent   = node.ending_tag  || 'ENDING';
  $endingTitle.textContent = node.title        || '';
  $endingDesc.textContent  = node.description  || '';
  $endingScreen.classList.add('visible');
}

// ── Keyboard Shortcuts ─────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (!engine.choiceShown) return;
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node) return;
  const choice = node.choices.find(c => c.hotkey === e.key);
  if (choice) handleChoice(choice);
});

// ── Autoplay Unblock (first user interaction) ──────────────────────────────────
document.addEventListener('pointerdown', () => {
  const v = engine.activeVideo;
  if (v && v.paused && !engine.choiceShown && !$endingScreen.classList.contains('visible')) {
    v.play().catch(() => {});
  }
}, { once: true });

// ── Restart ────────────────────────────────────────────────────────────────────
$restartBtn.addEventListener('click', () => {
  $endingScreen.classList.remove('visible');

  // 清空整个 pool，重新冷启动（确保 restart 状态干净）
  for (const [, v] of videoPool.entries()) {
    v.pause();
    v.removeAttribute('src');
    v.load();
    v.remove();
  }
  videoPool.clear();
  engine.activeVideo = null;

  loadNode(engine.gameData.start_node);
});

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  await new Promise(r => setTimeout(r, 1500));

  const data = await fetchGameData();
  if (!data) {
    showError();
    return;
  }

  engine.gameData = data;
  hideLoading();
  loadNode(data.start_node);
}

init();
</script>
</body>
</html>
