<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>STELLAR HEIR · 星之继承者</title>
  <!-- model-viewer 3D 模型渲染器 -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:        #050810;
      --clr-surface:   #0a0e1a;
      --clr-border:    #1c2a3a;
      --clr-accent:    #00d4ff;
      --clr-accent2:   #ff6b35;
      --clr-text:      #c8d8e8;
      --clr-text-dim:  #4a6070;
      --clr-danger:    #ff3b5c;
      --clr-success:   #00ff9d;
      --font-mono:     'Courier New', Courier, monospace;
      /* Phone shell dimensions — used on desktop only */
      --phone-w:       390px;
      --phone-h:       844px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Phone Shell (desktop preview frame) ─────────────────────────────── */
    #phone-shell {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #0d1520,
        0 0 60px rgba(0, 212, 255, 0.08),
        0 30px 80px rgba(0,0,0,0.9);
    }

    /* Notch */
    #phone-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }

    /* Scanline overlay */
    #phone-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 90;
    }

    /* ── HUD Header ───────────────────────────────────────────────────────── */
    #hud-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      padding: 30px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(5,8,16,0.9) 60%, transparent);
      pointer-events: none;
    }

    #hud-title {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--clr-accent);
      text-transform: uppercase;
    }

    #hud-status {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
    }

    #hud-status .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--clr-success);
      margin-right: 5px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Video Container ──────────────────────────────────────────────────── */
    /*
     * 所有动态创建的 <video> 都被注入到此容器中。
     * 活跃视频 class="vid-active"，预加载视频 class="vid-preload"（隐藏）。
     */
    #video-container {
      position: absolute;
      inset: 0;
      background: #000;
    }

    /* 活跃视频：铺满容器，可见 */
    #video-container .vid-active {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      transition: opacity 0.2s ease;
      z-index: 1;
    }

    /* 预加载视频：完全隐藏，不占布局，静音，后台拉流 */
    #video-container .vid-preload {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    /* 切换时的淡出过渡辅助 */
    #video-container .vid-fadeout {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Corner Brackets (decorative) ────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      z-index: 60;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--clr-accent);
      opacity: 0.5;
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }

    .corner-tl { top: 60px; left: 16px; }
    .corner-tl::before { top: 0; left: 0; }
    .corner-tl::after  { top: 0; left: 0; }

    .corner-tr { top: 60px; right: 16px; }
    .corner-tr::before { top: 0; right: 0; left: auto; }
    .corner-tr::after  { top: 0; right: 0; left: auto; }

    .corner-bl { bottom: 60px; left: 16px; }
    .corner-bl::before { bottom: 0; top: auto; left: 0; }
    .corner-bl::after  { bottom: 0; top: auto; left: 0; }

    .corner-br { bottom: 60px; right: 16px; }
    .corner-br::before { bottom: 0; top: auto; right: 0; left: auto; }
    .corner-br::after  { bottom: 0; top: auto; right: 0; left: auto; }

    /* ── Hotspot Layer ────────────────────────────────────────────────────── */
    /*
     * 热点层：绝对覆盖整个视频容器，pointer-events:none 默认不拦截点击，
     * 各热点按钮自身设置 pointer-events:auto。
     */
    #hotspot-layer {
      position: absolute;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      /* 热点层默认隐藏，showChoices 时淡入 */
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #hotspot-layer.visible {
      opacity: 1;
    }

    /* ── SVG Polygon Hotspot ─────────────────────────────────────────────── */
    /* SVG 容器覆盖整个热点层 */
    #hotspot-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    /* 多边形热点区域 */
    .poly-hotspot {
      fill: rgba(255,255,255,0.06);
      stroke: rgba(255,255,255,0.35);
      stroke-width: 1.5;
      stroke-dasharray: 5 3;
      cursor: pointer;
      pointer-events: all;
      transition: fill 0.18s ease, stroke 0.18s ease;
    }
    .poly-hotspot:hover {
      fill: rgba(255,255,255,0.16);
      stroke: rgba(255,255,255,0.7);
    }
    .poly-hotspot:active {
      fill: rgba(255,255,255,0.28);
    }

    /* ── Hotspot Button (Glassmorphism) ───────────────────────────────────── */
    .hotspot-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: pointer;

      /* Glassmorphism 核心 */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 40px;

      /* 文字 */
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;

      /* 内边距 */
      padding: 9px 18px 9px 14px;

      /* 阴影 */
      box-shadow:
        0 4px 24px rgba(0,0,0,0.35),
        0 1px 0 rgba(255,255,255,0.15) inset;

      /* 动画 */
      transition:
        transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;

      /* 入场动画 */
      animation: hotspot-enter 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* 热点按钮入场动画 */
    @keyframes hotspot-enter {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* 各热点按钮延迟入场，营造层次感 */
    .hotspot-btn:nth-child(1) { animation-delay: 0s; }
    .hotspot-btn:nth-child(2) { animation-delay: 0.07s; }
    .hotspot-btn:nth-child(3) { animation-delay: 0.14s; }
    .hotspot-btn:nth-child(4) { animation-delay: 0.21s; }

    .hotspot-btn:hover {
      transform: translate(-50%, -50%) scale(1.08);
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow:
        0 6px 32px rgba(0,0,0,0.45),
        0 0 20px rgba(255,255,255,0.12),
        0 1px 0 rgba(255,255,255,0.2) inset;
    }

    .hotspot-btn:active {
      transform: translate(-50%, -50%) scale(0.96);
      background: rgba(255, 255, 255, 0.28);
    }

    /* 就绪指示灯 */
    .hotspot-btn .hs-ready-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      margin-right: 7px;
      vertical-align: middle;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      flex-shrink: 0;
    }

    .hotspot-btn.is-ready .hs-ready-dot {
      background: var(--clr-success);
      box-shadow: 0 0 6px var(--clr-success);
    }

    /* 热点标签文字 */
    .hotspot-btn .hs-label {
      vertical-align: middle;
    }

    /* ── HUD Footer ───────────────────────────────────────────────────────── */
    #hud-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      padding: 0 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 50;
      background: linear-gradient(to top, rgba(5,8,16,0.85) 60%, transparent);
      pointer-events: none;
    }

    #node-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
      text-transform: uppercase;
    }

    #time-display {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
      font-variant-numeric: tabular-nums;
    }

    /* ── Loading Screen ───────────────────────────────────────────────────── */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo { text-align: center; }

    .loading-logo .logo-en {
      font-size: 11px;
      letter-spacing: 0.5em;
      color: var(--clr-accent);
      display: block;
      margin-bottom: 6px;
    }

    .loading-logo .logo-zh {
      font-size: 18px;
      letter-spacing: 0.3em;
      color: var(--clr-text);
      display: block;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: var(--clr-border);
      position: relative;
      overflow: hidden;
    }

    .loading-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--clr-accent);
      animation: loading-fill 1.4s ease forwards;
      box-shadow: 0 0 8px var(--clr-accent);
    }

    @keyframes loading-fill { to { width: 100%; } }

    .loading-text {
      font-size: 8px;
      letter-spacing: 0.3em;
      color: var(--clr-text-dim);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Tap-to-Start Overlay (mobile autoplay gate) ──────────────────────── */
    #tap-start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.88);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      z-index: 180;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #tap-start-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .tap-start-icon {
      font-size: 36px;
      opacity: 0.7;
      animation: tap-pulse 1.8s ease-in-out infinite;
    }

    @keyframes tap-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }

    .tap-start-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--clr-text);
      text-transform: uppercase;
    }

    .tap-start-sublabel {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
    }

    /* ── Ending Screen ────────────────────────────────────────────────────── */
    #ending-screen {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #ending-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ending-tag {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--clr-accent2);
      text-transform: uppercase;
    }

    .ending-title {
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--clr-text);
      text-align: center;
      padding: 0 30px;
    }

    .ending-desc {
      font-size: 10px;
      line-height: 1.8;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 40px;
      letter-spacing: 0.05em;
    }

    .ending-divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--clr-accent2), transparent);
    }

    .restart-btn {
      margin-top: 10px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid rgba(255, 107, 53, 0.4);
      color: var(--clr-accent2);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .restart-btn:hover {
      background: rgba(255, 107, 53, 0.1);
      border-color: var(--clr-accent2);
      box-shadow: 0 0 16px rgba(255, 107, 53, 0.2);
    }

    /* ── Error Screen ─────────────────────────────────────────────────────── */
    #error-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 300;
    }

    #error-screen.visible { display: flex; }

    .error-code {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--clr-danger);
    }

    .error-msg {
      font-size: 11px;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 30px;
    }

    /* ── Responsive: full-screen on real mobile ─────────────────────────────────────── */
    @media (max-width: 430px) {
      #phone-shell {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: none;
      }
    }

    /* ── Panorama Mode ───────────────────────────────────────────────────────────── */
    /* model-viewer 3D 模型全屏容器 */
    #model3d-container {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
    }
    #model3d-container.visible {
      display: block;
    }
    /* 全景模式下隐藏视频层 */
    body.pano-mode #video-container { display: none; }
    body.pano-mode #hotspot-layer   { display: none; }
    body.pano-mode #hud-footer      { z-index: 60; }

    /* 3D 模型热点按钮（model-viewer slot hotspot） */
    .pano-hs-btn {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-mono);
      padding: 7px 16px;
      white-space: nowrap;
      cursor: pointer;
      pointer-events: all;
      transform: translateX(-50%);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      letter-spacing: 0.04em;
    }
    .pano-hs-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 6px 32px rgba(255,255,255,0.12);
    }

    /* model-viewer 默认控件样式 */
    /* model-viewer 全屏模式 */
    body.model3d-mode #phone-shell { background: #000; }
    body.model3d-mode .vid-active,
    body.model3d-mode .vid-preload { display: none !important; }
    body.model3d-mode #hotspot-layer { display: none; }
    /* 3D 热点按钮 (model-viewer slot) */
    .hotspot-3d-btn {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s ease, background 0.15s ease;
      letter-spacing: 0.02em;
    }
    .hotspot-3d-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(255,255,255,0.3);
    }
    /* model-viewer 进度条 */
    .progress-bar {
      display: block;
      width: 33%;
      height: 3px;
      max-height: 3px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 25%;
      box-shadow: 0px 3px 10px 3px rgba(0,0,0,0.5),
                  0px 0px 5px 1px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
    }
    .update-bar {
      background: rgba(255,255,255,0.9);
      width: 0%;
      height: 100%;
      border-radius: 25%;
      float: left;
      transition: width 0.3s;
    }
    .pnlm-controls-container { display: none !important; }
    .pnlm-load-box { display: none !important; }
  </style>
</head>
<body>

<div id="phone-shell">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">
      <span class="logo-en">STELLAR HEIR</span>
      <span class="logo-zh">星之继承者</span>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
    <span class="loading-text">INITIALIZING SYSTEM ···</span>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <span class="error-code">ERR · DATA_LINK_FAILURE</span>
    <p class="error-msg">无法连接至游戏数据服务器<br>请确认后端服务已启动</p>
  </div>

  <!-- Tap-to-Start Overlay (mobile autoplay gate) -->
  <div id="tap-start-overlay">
    <div class="tap-start-icon">▶</div>
    <span class="tap-start-label">TAP TO BEGIN · 点击开始</span>
    <span class="tap-start-sublabel">STELLAR HEIR · 星之继承者</span>
  </div>

  <!-- HUD Header -->
  <div id="hud-header">
    <span id="hud-title">STELLAR HEIR</span>
    <span id="hud-status"><span class="dot"></span>SYS ONLINE</span>
  </div>

  <!-- Corner Brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Video Container — 所有 <video> 实例动态注入此处 -->
  <div id="video-container"></div>

  <!-- Hotspot Layer — 热点按鈕绝对定位于此层，覆盖视频画面 -->
  <div id="hotspot-layer">
    <!-- SVG 多边形热点层 -->
    <svg id="hotspot-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- 3D Model Container — model-viewer 容器（3d_model 节点时显示） -->
  <div id="model3d-container"></div>

  <!-- Ending Screen -->
  <div id="ending-screen">
    <span class="ending-tag" id="ending-tag-text"></span>
    <div class="ending-divider"></div>
    <h2 class="ending-title" id="ending-title-text"></h2>
    <p class="ending-desc" id="ending-desc-text"></p>
    <div class="ending-divider"></div>
    <button class="restart-btn" id="restart-btn">[ RESTART · 重新开始 ]</button>
  </div>

  <!-- HUD Footer -->
  <div id="hud-footer">
    <span id="node-label">NODE ···</span>
    <span id="time-display">00:00</span>
  </div>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
//  STELLAR HEIR · Video Pool Engine v3.0  (Hotspot Edition)
//
//  核心架构：
//    videoPool  Map<nodeId, HTMLVideoElement>
//      - 活跃视频：class="vid-active"，unmuted，可见，z-index:1
//      - 预加载视频：class="vid-preload"，muted，隐藏，后台缓冲
//
//  热点系统：
//    - #hotspot-layer 绝对覆盖视频容器
//    - 每个 choice 的 position.x / position.y（百分比）驱动按钮位置
//    - Glassmorphism 样式，hover 缩放 + 发光反馈
//    - 视频暂停时热点淡入，选择后热点立即淡出
//
//  移动端兼容：
//    - 初始 muted 绕过自动播放策略
//    - 若 play() 被拦截，显示 #tap-start-overlay，等待用户交互后重试
//    - playsInline + webkit-playsinline 保证 iOS Safari 内联播放
// ════════════════════════════════════════════════════════════════════════

// ── DOM Refs ──────────────────────────────────────────────────────────────────
const $loadingScreen  = document.getElementById('loading-screen');
const $errorScreen    = document.getElementById('error-screen');
const $tapStart       = document.getElementById('tap-start-overlay');
const $videoContainer = document.getElementById('video-container');
const $hotspotLayer   = document.getElementById('hotspot-layer');
const $hotspotSvg     = document.getElementById('hotspot-svg');
const $model3dContainer = document.getElementById('model3d-container');
const $endingScreen   = document.getElementById('ending-screen');
const $endingTag      = document.getElementById('ending-tag-text');
const $endingTitle    = document.getElementById('ending-title-text');
const $endingDesc     = document.getElementById('ending-desc-text');
const $restartBtn     = document.getElementById('restart-btn');
const $nodeLabel      = document.getElementById('node-label');
const $timeDisplay    = document.getElementById('time-display');

// ── Engine State ──────────────────────────────────────────────────────────────
const engine = {
  gameData:      null,   // 完整 JSON 数据
  currentNodeId: null,   // 当前活跃节点 ID
  activeVideo:   null,   // 当前活跃 <video> 元素引用
  choiceShown:   false,  // 是否已弹出热点选项
  branchHandled: false,  // 是否已触发分支（防重入）
  transitioning: false,  // 是否正在切换节点（防重复点击）
  userInteracted: false, // 用户是否已交互（解锁音频）
};

// ── Video Pool ─────────────────────────────────────────────────────────────────
// Map<nodeId: string, video: HTMLVideoElement>
const videoPool = new Map();

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function hideLoading() {
  $loadingScreen.classList.add('hidden');
}

function showError() {
  $errorScreen.classList.add('visible');
  hideLoading();
}

// ── Fetch Game Data ────────────────────────────────────────────────────────────
async function fetchGameData() {
  try {
    const res = await fetch('/api/game-data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('[VideoPool] fetchGameData failed:', err);
    return null;
  }
}

// ── Create a Video Element ─────────────────────────────────────────────────────
/**
 * 工厂函数：创建标准化 <video> 实例并注入 video-container。
 * @param {string}  nodeId - 对应节点 ID
 * @param {string}  url    - 视频 URL
 * @param {boolean} hidden - true=预加载（隐藏）；false=活跃（可见）
 */
function createVideoElement(nodeId, url, hidden) {
  const v = document.createElement('video');
  v.dataset.nodeId = nodeId;
  v.src            = url;
  v.preload        = 'auto';
  v.playsInline    = true;
  v.setAttribute('webkit-playsinline', '');
  v.muted          = true;   // 初始静音，绕过自动播放策略
  v.className      = hidden ? 'vid-preload' : 'vid-active';

  v.addEventListener('error', (e) => {
    console.error(`[VideoPool] Video error on node ${nodeId}:`, e);
  });

  $videoContainer.appendChild(v);
  v.load();

  console.log(`[VideoPool] Created <video> for node="${nodeId}" hidden=${hidden}`);
  return v;
}

// ── Preload Node ───────────────────────────────────────────────────────────────
function preloadNode(nodeId) {
  if (videoPool.has(nodeId)) return;

  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.warn(`[VideoPool] Preload target not found: ${nodeId}`);
    return;
  }

  const v = createVideoElement(nodeId, node.video_url, true);
  videoPool.set(nodeId, v);
  console.log(`[VideoPool] Preloading: ${nodeId} → ${node.video_url}`);

  v.addEventListener('canplaythrough', () => {
    console.log(`[VideoPool] Ready: ${nodeId}`);
    markHotspotReady(nodeId);
  }, { once: true });
}

// ── Release Stale Videos ───────────────────────────────────────────────────────
function releaseStaleVideos(keepIds) {
  for (const [nodeId, v] of videoPool.entries()) {
    if (!keepIds.has(nodeId)) {
      console.log(`[VideoPool] Releasing: ${nodeId}`);
      v.pause();
      v.removeAttribute('src');
      v.load();
      v.remove();
      videoPool.delete(nodeId);
    }
  }
}

// ── Activate Video ─────────────────────────────────────────────────────────────
async function activateVideo(v) {
  v.className   = 'vid-active';
  v.currentTime = 0;

  if (engine.userInteracted) {
    v.muted = false;
  }

  try {
    await v.play();
    // 播放成功后若用户已交互则确保取消静音
    if (engine.userInteracted) v.muted = false;
  } catch (err) {
    console.warn('[VideoPool] play() blocked:', err.message);
    // 静音重试
    v.muted = true;
    try {
      await v.play();
      // 显示 tap-to-start 遮罩，等待用户点击解锁音频
      showTapStart();
    } catch (e) {
      console.error('[VideoPool] Muted play also blocked:', e);
      showTapStart();
    }
  }
}

// ── Deactivate Video ───────────────────────────────────────────────────────────
function deactivateVideo(v) {
  v.className = 'vid-fadeout';
  v.pause();
  setTimeout(() => {
    if (v.parentNode) {
      v.pause();
      v.removeAttribute('src');
      v.load();
      v.remove();
    }
  }, 250);
}

// ── Tap-to-Start (mobile autoplay gate) ───────────────────────────────────────
function showTapStart() {
  if ($tapStart.classList.contains('visible')) return;
  $tapStart.classList.add('visible');
}
function hideTapStart() {
  $tapStart.classList.remove('visible');
}
function unlockAudio() {
  if (engine.userInteracted) return;
  engine.userInteracted = true;
  hideTapStart();
  if (engine.activeVideo) {
    engine.activeVideo.muted = false;
    engine.activeVideo.play().catch(() => {});
  }
}
$tapStart.addEventListener('click', unlockAudio);
// 手机端备用：任意 touch 也解锁音频
$tapStart.addEventListener('touchstart', unlockAudio, { passive: true });

// ── Load Node (Main Entry) ─────────────────────────────────────────────────────
async function loadNode(nodeId) {
  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.error('[VideoPool] loadNode: node not found:', nodeId);
    return;
  }

  engine.currentNodeId  = nodeId;
  engine.choiceShown    = false;
  engine.branchHandled  = false;
  engine.transitioning  = false;

  // 重置 UI
  hideHotspots();
  $endingScreen.classList.remove('visible');
  $nodeLabel.textContent = `NODE · ${nodeId.replace('_', ' ')}`;

  // ── 分流：3d_model 节点走 model-viewer 引擎 ─────────────────────────────
  if (node.type === '3d_model') {
    await load3DModelNode(node);
    return;
  }

  // ── 退出 3D 模式（如果之前是 3D 模型）────────────────────────────────────
  exit3DModelMode();

  // ── 步骤 1：获取或创建目标视频 ──────────────────────────────────────────
  let targetVideo;
  if (videoPool.has(nodeId)) {
    targetVideo = videoPool.get(nodeId);
    console.log(`[VideoPool] Cache HIT: ${nodeId} — seamless switch!`);
  } else {
    targetVideo = createVideoElement(nodeId, node.video_url, false);
    videoPool.set(nodeId, targetVideo);
    console.log(`[VideoPool] Cache MISS: ${nodeId} — cold start`);
  }

  // ── 步骤 2：淡出旧视频，激活新视频 ─────────────────────────────────────
  if (engine.activeVideo && engine.activeVideo !== targetVideo) {
    deactivateVideo(engine.activeVideo);
  }

  engine.activeVideo = targetVideo;
  await activateVideo(targetVideo);

  // 绑定事件（每次激活后重新绑定，避免多实例事件冲突）
  targetVideo.addEventListener('timeupdate', onTimeUpdate);
  targetVideo.addEventListener('seeked',     onSeeked);
  targetVideo.addEventListener('ended',      onEnded);

  // ── 步骤 3：立即预加载所有分支目标（含全景节点）──────────────────────────
  const keepIds = new Set([nodeId]);
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach(choice => {
      const targetNode = engine.gameData.nodes[choice.target_node];
      keepIds.add(choice.target_node);
      if (targetNode && targetNode.type === '3d_model') {
        preload3DModel(choice.target_node);
      } else {
        preloadNode(choice.target_node);
      }
    });
  }

  // ── 步骤 4：释放不在保留集合中的旧视频 ──────────────────────────────────
  releaseStaleVideos(keepIds);
}

// ── timeupdate Handler ─────────────────────────────────────────────────────────
function onTimeUpdate() {
  if (this !== engine.activeVideo) return;
  const t = this.currentTime;
  $timeDisplay.textContent = formatTime(t);
  maybeTriggerBranch(t);
}

// ── seeked Handler ─────────────────────────────────────────────────────────────
function onSeeked() {
  if (this !== engine.activeVideo) return;
  maybeTriggerBranch(this.currentTime);
}

// ── ended Handler ─────────────────────────────────────────────────────────────
function onEnded() {
  if (this !== engine.activeVideo) return;
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (node && node.type === 'ending') {
    showEnding(node);
  } else if (node && node.type === 'branching') {
    // 视频结束但还没触发分支，强制显示热点
    showChoices(node);
  }
}

// ── Branch Trigger ─────────────────────────────────────────────────────────────────
/**
 * 每帧 timeupdate 时调用。
 * 1. 到达 branch_at_second 时首次触发 showChoices（初始化热点 DOM）
 * 2. 后续每帧根据各 choice.timeWindow 实时控制热点显隐
 */
function maybeTriggerBranch(currentTime) {
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node || node.type !== 'branching') return;

  const branchAt = Number(node.branch_at_second);
  if (!Number.isFinite(branchAt)) return;

  // 首次到达分支点：创建热点 DOM
  if (!engine.branchHandled && currentTime >= branchAt) {
    engine.branchHandled = true;
    showChoices(node);
    return;
  }

  // 已建立热点 DOM：根据 timeWindow 实时控制显隐
  if (engine.choiceShown) {
    updateHotspotVisibility(node, currentTime);
  }
}

/**
 * 根据 当前播放时间 和 各 choice.timeWindow 实时控制热点显隐
 */
function updateHotspotVisibility(node, currentTime) {
  node.choices.forEach((choice, idx) => {
    const tw = choice.timeWindow;
    if (!tw || !Array.isArray(tw) || tw.length < 2) return; // 无 timeWindow 则始终显示
    const visible = currentTime >= tw[0] && currentTime <= tw[1];

    if (choice.type === 'polygon') {
      // SVG 多边形热点
      const poly = $hotspotSvg.querySelector(`[data-choice-idx="${idx}"]`);
      if (poly) poly.style.display = visible ? '' : 'none';
    } else {
      // 文字按鈕热点
      const btn = $hotspotLayer.querySelector(`[data-choice-idx="${idx}"]`);
      if (btn) btn.style.display = visible ? '' : 'none';
    }
  });
}

// ── Show Choices (Hotspot Rendering) ──────────────────────────────────────────────
/**
 * 在 #hotspot-layer 中动态创建热点。
 * - 文字热点：<button class="hotspot-btn"> 绝对定位
 * - 多边形热点：<polygon> 渲染到 #hotspot-svg，百分比坐标系
 * - timeWindow 存在时，初始根据当前时间决定是否显示
 */
function showChoices(node) {
  if (engine.choiceShown) return;
  engine.choiceShown = true;

  // 清空按鈕热点（保留 SVG 容器）
  $hotspotLayer.querySelectorAll('.hotspot-btn').forEach(el => el.remove());
  // 清空 SVG 多边形
  $hotspotSvg.innerHTML = '';

  const currentTime = engine.activeVideo ? engine.activeVideo.currentTime : 0;

  node.choices.forEach((choice, idx) => {
    const tw = choice.timeWindow;
    const inWindow = !tw || !Array.isArray(tw) || tw.length < 2
      || (currentTime >= tw[0] && currentTime <= tw[1]);

    if (choice.type === 'polygon' && choice.points && choice.points.length >= 3) {
      // ── 多边形热点 ───────────────────────────────────────────────────────
      // 将百分比坐标转为 SVG viewBox 坐标（使用 0-100 坐标系）
      const pts = choice.points
        .map(p => `${parseFloat(p.x)},${parseFloat(p.y)}`)
        .join(' ');

      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', pts);
      polygon.setAttribute('vector-effect', 'non-scaling-stroke');
      polygon.classList.add('poly-hotspot');
      polygon.dataset.choiceIdx = idx;
      polygon.dataset.targetNode = choice.target_node || '';
      polygon.style.display = inWindow ? '' : 'none';
      polygon.title = choice.label || '';

      // 将 SVG viewBox 设为 0 0 100 100，匹配百分比坐标
      $hotspotSvg.setAttribute('viewBox', '0 0 100 100');
      $hotspotSvg.setAttribute('preserveAspectRatio', 'none');
      $hotspotSvg.style.pointerEvents = 'none';

      polygon.addEventListener('click', () => handleChoice(choice));
      $hotspotSvg.appendChild(polygon);

    } else {
      // ── 文字热点 ────────────────────────────────────────────────────────────────
      const btn = document.createElement('button');
      btn.className = 'hotspot-btn';
      btn.dataset.targetNode = choice.target_node || '';
      btn.dataset.choiceIdx = idx;

      const pos = choice.position || {};
      const px  = pos.x || defaultHotspotX(idx, node.choices.length);
      const py  = pos.y || defaultHotspotY(idx, node.choices.length);
      btn.style.left = px;
      btn.style.top  = py;
      btn.style.display = inWindow ? '' : 'none';

      btn.innerHTML = `
        <span class="hs-ready-dot"></span>
        <span class="hs-label">${choice.label || ''}</span>
      `;

      const preloadedVid = videoPool.get(choice.target_node);
      if (preloadedVid && preloadedVid.readyState >= 4) btn.classList.add('is-ready');

      btn.addEventListener('click', () => handleChoice(choice));
      $hotspotLayer.appendChild(btn);
    }
  });

  // 淡入热点层（如果有热点在窗口内）
  $hotspotLayer.classList.add('visible');

  // 如果所有热点都有 timeWindow 且当前时间均不在窗口内，不暂停视频
  const anyVisible = node.choices.some(c => {
    const tw = c.timeWindow;
    if (!tw || !Array.isArray(tw) || tw.length < 2) return true;
    return currentTime >= tw[0] && currentTime <= tw[1];
  });
  if (anyVisible) {
    engine.activeVideo.pause();
  }
}

// ── Hide Hotspots ─────────────────────────────────────────────────────────────────
function hideHotspots() {
  $hotspotLayer.classList.remove('visible');
  // 等动画结束后清空 DOM，避免闪烁
  setTimeout(() => {
    if (!$hotspotLayer.classList.contains('visible')) {
      $hotspotLayer.innerHTML = '';
    }
  }, 420);
}

// ── Default Hotspot Positions (fallback) ──────────────────────────────────────
/**
 * 当 choice.position 未定义时，按垂直居中均匀分布作为回退。
 */
function defaultHotspotX(idx, total) {
  return '50%';
}

function defaultHotspotY(idx, total) {
  // 在 55%–80% 区间内均匀分布
  const start = 55, end = 80;
  if (total === 1) return `${(start + end) / 2}%`;
  const step = (end - start) / (total - 1);
  return `${(start + idx * step).toFixed(1)}%`;
}

// ── Mark Hotspot Ready ─────────────────────────────────────────────────────────
function markHotspotReady(nodeId) {
  const btn = $hotspotLayer.querySelector(`[data-target-node="${nodeId}"]`);
  if (btn) btn.classList.add('is-ready');
}

// ── Handle Choice ──────────────────────────────────────────────────────────────
function handleChoice(choice) {
  if (engine.transitioning) return;
  engine.transitioning = true;

  // 立即隐藏热点层
  hideHotspots();

  // 移除旧视频的事件监听（防止事件泄漏）
  if (engine.activeVideo) {
    engine.activeVideo.removeEventListener('timeupdate', onTimeUpdate);
    engine.activeVideo.removeEventListener('seeked',     onSeeked);
    engine.activeVideo.removeEventListener('ended',      onEnded);
  }

  // 直接切换到预加载好的视频（无黑屏等待）
  loadNode(choice.target_node);
}

// ── Show Ending ────────────────────────────────────────────────────────────────
function showEnding(node) {
  $endingTag.textContent   = node.ending_tag  || 'ENDING';
  $endingTitle.textContent = node.title        || '';
  $endingDesc.textContent  = node.description  || '';
  $endingScreen.classList.add('visible');
}

// ── Keyboard Shortcuts ─────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (!engine.choiceShown) return;
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node) return;
  const choice = node.choices.find(c => c.hotkey === e.key);
  if (choice) handleChoice(choice);
});

// ── Restart ────────────────────────────────────────────────────────────────────
$restartBtn.addEventListener('click', () => {
  $endingScreen.classList.remove('visible');
  hideHotspots();

  // 清空整个 pool，重新冷启动
  for (const [, v] of videoPool.entries()) {
    v.pause();
    v.removeAttribute('src');
    v.load();
    v.remove();
  }
  videoPool.clear();
  engine.activeVideo = null;

  showTapStart();
  loadNode(engine.gameData.start_node);
});
// ── Initt ───────────────────────────────────────────────────────────────────────
async function init() {
  // 短暂 loading 动画
  await new Promise(r => setTimeout(r, 1400));

  const data = await fetchGameData();
  if (!data) {
    showError();
    return;
  }

  engine.gameData = data;
  hideLoading();
  // 手机端：主动显示 tap-to-start，确保用户第一次交互就能解锁音频
  showTapStart();
  loadNode(data.start_node);
}

init();

// ══════════════════════════════════════════════════════════════════════════════
//  3D MODEL ENGINE  (model-viewer based)
//  支持 3d_model 类型节点：.glb 模型预加载、model-viewer 初始化、3D 热点渲染
// ══════════════════════════════════════════════════════════════════════════════
// 当前 model-viewer 实例
let currentModelViewer = null;
// 预加载 3D 模型（通过 fetch 将 .glb 拉入浏览器缓存）
const model3dCache = new Set(); // 已预加载的 nodeId
function preload3DModel(nodeId) {
  if (model3dCache.has(nodeId)) return;
  const node = engine.gameData.nodes[nodeId];
  if (!node || node.type !== '3d_model' || !node.model_url) return;
  // 使用 fetch 将 .glb 文件拉入 HTTP 缓存
  fetch(node.model_url, { mode: 'no-cors' }).catch(() => {});
  model3dCache.add(nodeId);
  console.log(`[3DEngine] Preloading model: ${nodeId} → ${node.model_url}`);
}
// 进入 3D 模型模式
async function load3DModelNode(node) {
  // 暂停并隐藏所有视频
  if (engine.activeVideo) {
    engine.activeVideo.pause();
    engine.activeVideo = null;
  }
  document.body.classList.add('model3d-mode');
  $model3dContainer.classList.add('visible');
  // 销毁旧的 model-viewer 实例
  if (currentModelViewer) {
    currentModelViewer.remove();
    currentModelViewer = null;
  }
  $model3dContainer.innerHTML = '';
  const modelUrl = node.model_url || '';
  if (!modelUrl) {
    $model3dContainer.innerHTML = '<div style="color:#fff;padding:40px;text-align:center;">暂无 3D 模型，请在编辑器中上传</div>';
    return;
  }
  // 创建 model-viewer 元素
  const mv = document.createElement('model-viewer');
  mv.setAttribute('src', modelUrl);
  mv.setAttribute('camera-controls', '');
  mv.setAttribute('auto-rotate', '');
  mv.setAttribute('shadow-intensity', '1');
  mv.setAttribute('exposure', '1');
  mv.setAttribute('environment-image', 'neutral');
  mv.setAttribute('loading', 'eager');
  mv.setAttribute('reveal', 'auto');
  if (node.camera_orbit) {
    mv.setAttribute('camera-orbit', node.camera_orbit);
  }
  // 加载进度条
  mv.innerHTML = `
    <div class="progress-bar" slot="progress-bar">
      <div class="update-bar"></div>
    </div>
  `;
  mv.style.cssText = 'width:100%;height:100%;background:#000;';
  // 渲染 3D 热点
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach((choice, idx) => {
      const pos    = choice.position || '0 0 0';
      const normal = choice.normal   || '0 1 0';
      // 创建热点 slot
      const btn = document.createElement('button');
      btn.slot = `hotspot-${idx}`;
      btn.setAttribute('data-position', pos);
      btn.setAttribute('data-normal', normal);
      btn.className = 'hotspot-3d-btn';
      btn.textContent = choice.label || `选项 ${idx + 1}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        handleChoice(choice);
      });
      mv.appendChild(btn);
    });
  }
  $model3dContainer.appendChild(mv);
  currentModelViewer = mv;
  // 预加载分支目标
  if (node.choices) {
    node.choices.forEach(c => {
      const target = engine.gameData.nodes[c.target_node];
      if (target && target.type === '3d_model') {
        preload3DModel(c.target_node);
      } else if (target) {
        preloadNode(c.target_node);
      }
    });
  }
  console.log(`[3DEngine] Model loaded: ${node.model_url}`);
}
// 退出 3D 模式，恢复视频模式
function exit3DModelMode() {
  if (!document.body.classList.contains('model3d-mode')) return;
  document.body.classList.remove('model3d-mode');
  $model3dContainer.classList.remove('visible');
  if (currentModelViewer) {
    currentModelViewer.remove();
    currentModelViewer = null;
  }
  $model3dContainer.innerHTML = '';
}


</script>
