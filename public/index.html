<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>STELLAR HEIR · 星之继承者</title>
  <!-- model-viewer 3D 模型渲染器 -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:        #050810;
      --clr-surface:   #0a0e1a;
      --clr-border:    #1c2a3a;
      --clr-accent:    #00d4ff;
      --clr-accent2:   #ff6b35;
      --clr-text:      #c8d8e8;
      --clr-text-dim:  #4a6070;
      --clr-danger:    #ff3b5c;
      --clr-success:   #00ff9d;
      --font-mono:     'Courier New', Courier, monospace;
      /* Phone shell dimensions — used on desktop only */
      --phone-w:       390px;
      --phone-h:       844px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Phone Shell (desktop preview frame) ─────────────────────────────── */
    #phone-shell {
      position: relative;
      width: var(--phone-w);
      height: var(--phone-h);
      background: var(--clr-bg);
      border: 1px solid var(--clr-border);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #0d1520,
        0 0 60px rgba(0, 212, 255, 0.08),
        0 30px 80px rgba(0,0,0,0.9);
    }

    /* Notch */
    #phone-shell::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #000;
      border-radius: 0 0 18px 18px;
      z-index: 100;
    }

    /* Scanline overlay */
    #phone-shell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 90;
    }

    /* ── HUD Header ───────────────────────────────────────────────────────── */
    #hud-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 56px;
      padding: 30px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 50;
      background: linear-gradient(to bottom, rgba(5,8,16,0.9) 60%, transparent);
      pointer-events: none;
    }

    #hud-title {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--clr-accent);
      text-transform: uppercase;
    }

    #hud-status {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
    }

    #hud-status .dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--clr-success);
      margin-right: 5px;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Video Container ──────────────────────────────────────────────────── */
    /*
     * 所有动态创建的 <video> 都被注入到此容器中。
     * 活跃视频 class="vid-active"，预加载视频 class="vid-preload"（隐藏）。
     */
    #video-container {
      position: absolute;
      inset: 0;
      background: #000;
    }

    /* 活跃视频：铺满容器，可见 */
    #video-container .vid-active {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 1;
      transition: opacity 0.2s ease;
      z-index: 1;
    }

    /* 预加载视频：完全隐藏，不占布局，静音，后台拉流 */
    #video-container .vid-preload {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    /* 切换时的淡出过渡辅助 */
    #video-container .vid-fadeout {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Corner Brackets (decorative) ────────────────────────────────────── */
    .corner {
      position: absolute;
      width: 18px; height: 18px;
      z-index: 60;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--clr-accent);
      opacity: 0.5;
    }
    .corner::before { width: 100%; height: 1px; }
    .corner::after  { width: 1px; height: 100%; }

    .corner-tl { top: 60px; left: 16px; }
    .corner-tl::before { top: 0; left: 0; }
    .corner-tl::after  { top: 0; left: 0; }

    .corner-tr { top: 60px; right: 16px; }
    .corner-tr::before { top: 0; right: 0; left: auto; }
    .corner-tr::after  { top: 0; right: 0; left: auto; }

    .corner-bl { bottom: 60px; left: 16px; }
    .corner-bl::before { bottom: 0; top: auto; left: 0; }
    .corner-bl::after  { bottom: 0; top: auto; left: 0; }

    .corner-br { bottom: 60px; right: 16px; }
    .corner-br::before { bottom: 0; top: auto; right: 0; left: auto; }
    .corner-br::after  { bottom: 0; top: auto; right: 0; left: auto; }

    /* ── Hotspot Layer ────────────────────────────────────────────────────── */
    /*
     * 热点层：绝对覆盖整个视频容器，pointer-events:none 默认不拦截点击，
     * 各热点按钮自身设置 pointer-events:auto。
     */
    #hotspot-layer {
      position: absolute;
      inset: 0;
      z-index: 70;
      pointer-events: none;
      /* 热点层默认隐藏，showChoices 时淡入 */
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #hotspot-layer.visible {
      opacity: 1;
    }

    /* ── SVG Polygon Hotspot ─────────────────────────────────────────────── */
    /* SVG 容器覆盖整个热点层 */
    #hotspot-svg {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    /* 多边形热点区域 */
    .poly-hotspot {
      fill: rgba(255,255,255,0.06);
      stroke: rgba(255,255,255,0.35);
      stroke-width: 1.5;
      stroke-dasharray: 5 3;
      cursor: pointer;
      pointer-events: all;
      transition: fill 0.18s ease, stroke 0.18s ease;
    }
    .poly-hotspot:hover {
      fill: rgba(255,255,255,0.16);
      stroke: rgba(255,255,255,0.7);
    }
    .poly-hotspot:active {
      fill: rgba(255,255,255,0.28);
    }

    /* ── Hotspot Button (Glassmorphism) ───────────────────────────────────── */
    .hotspot-btn {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: auto;
      cursor: pointer;

      /* Glassmorphism 核心 */
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 40px;

      /* 文字 */
      color: #fff;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-align: center;
      white-space: nowrap;

      /* 内边距 */
      padding: 9px 18px 9px 14px;

      /* 阴影 */
      box-shadow:
        0 4px 24px rgba(0,0,0,0.35),
        0 1px 0 rgba(255,255,255,0.15) inset;

      /* 动画 */
      transition:
        transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1),
        background 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;

      /* 入场动画 */
      animation: hotspot-enter 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* 热点按钮入场动画 */
    @keyframes hotspot-enter {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.7);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    /* 各热点按钮延迟入场，营造层次感 */
    .hotspot-btn:nth-child(1) { animation-delay: 0s; }
    .hotspot-btn:nth-child(2) { animation-delay: 0.07s; }
    .hotspot-btn:nth-child(3) { animation-delay: 0.14s; }
    .hotspot-btn:nth-child(4) { animation-delay: 0.21s; }

    .hotspot-btn:hover {
      transform: translate(-50%, -50%) scale(1.08);
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow:
        0 6px 32px rgba(0,0,0,0.45),
        0 0 20px rgba(255,255,255,0.12),
        0 1px 0 rgba(255,255,255,0.2) inset;
    }

    .hotspot-btn:active {
      transform: translate(-50%, -50%) scale(0.96);
      background: rgba(255, 255, 255, 0.28);
    }

    /* 就绪指示灯 */
    .hotspot-btn .hs-ready-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      margin-right: 7px;
      vertical-align: middle;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      flex-shrink: 0;
    }

    .hotspot-btn.is-ready .hs-ready-dot {
      background: var(--clr-success);
      box-shadow: 0 0 6px var(--clr-success);
    }

    /* 热点标签文字 */
    .hotspot-btn .hs-label {
      vertical-align: middle;
    }

    /* ── HUD Footer ───────────────────────────────────────────────────────── */
    #hud-footer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      padding: 0 20px 22px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      z-index: 50;
      background: linear-gradient(to top, rgba(5,8,16,0.85) 60%, transparent);
      pointer-events: none;
    }

    #node-label {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
      text-transform: uppercase;
    }

    #time-display {
      font-size: 8px;
      letter-spacing: 0.15em;
      color: var(--clr-text-dim);
      font-variant-numeric: tabular-nums;
    }

    /* ── Loading Screen ───────────────────────────────────────────────────── */
    #loading-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.6s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-logo { text-align: center; }

    .loading-logo .logo-en {
      font-size: 11px;
      letter-spacing: 0.5em;
      color: var(--clr-accent);
      display: block;
      margin-bottom: 6px;
    }

    .loading-logo .logo-zh {
      font-size: 18px;
      letter-spacing: 0.3em;
      color: var(--clr-text);
      display: block;
    }

    .loading-bar-wrap {
      width: 200px;
      height: 2px;
      background: var(--clr-border);
      position: relative;
      overflow: hidden;
    }

    .loading-bar-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: var(--clr-accent);
      animation: loading-fill 1.4s ease forwards;
      box-shadow: 0 0 8px var(--clr-accent);
    }

    @keyframes loading-fill { to { width: 100%; } }

    .loading-text {
      font-size: 8px;
      letter-spacing: 0.3em;
      color: var(--clr-text-dim);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Tap-to-Start Overlay (mobile autoplay gate) ──────────────────────── */
    #tap-start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.88);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      z-index: 180;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #tap-start-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .tap-start-icon {
      font-size: 36px;
      opacity: 0.7;
      animation: tap-pulse 1.8s ease-in-out infinite;
    }

    @keyframes tap-pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }

    .tap-start-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--clr-text);
      text-transform: uppercase;
    }

    .tap-start-sublabel {
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--clr-text-dim);
    }

    /* ── Ending Screen ────────────────────────────────────────────────────── */
    #ending-screen {
      position: absolute;
      inset: 0;
      background: rgba(5, 8, 16, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      z-index: 80;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    #ending-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ending-tag {
      font-size: 10px;
      letter-spacing: 0.4em;
      color: var(--clr-accent2);
      text-transform: uppercase;
    }

    .ending-title {
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--clr-text);
      text-align: center;
      padding: 0 30px;
    }

    .ending-desc {
      font-size: 10px;
      line-height: 1.8;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 40px;
      letter-spacing: 0.05em;
    }

    .ending-divider {
      width: 160px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--clr-accent2), transparent);
    }

    .restart-btn {
      margin-top: 10px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid rgba(255, 107, 53, 0.4);
      color: var(--clr-accent2);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s ease;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
    }

    .restart-btn:hover {
      background: rgba(255, 107, 53, 0.1);
      border-color: var(--clr-accent2);
      box-shadow: 0 0 16px rgba(255, 107, 53, 0.2);
    }

    /* ── Error Screen ─────────────────────────────────────────────────────── */
    #error-screen {
      position: absolute;
      inset: 0;
      background: var(--clr-bg);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 300;
    }

    #error-screen.visible { display: flex; }

    .error-code {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--clr-danger);
    }

    .error-msg {
      font-size: 11px;
      color: var(--clr-text-dim);
      text-align: center;
      padding: 0 30px;
    }

    /* ── Responsive: full-screen on real mobile ─────────────────────────────────────── */
    @media (max-width: 430px) {
      #phone-shell {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: none;
      }
    }

    /* ── Panorama Mode ───────────────────────────────────────────────────────────── */
    /* model-viewer 3D 模型全屏容器 */
    #model3d-container {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
    }
    #model3d-container.visible {
      display: block;
    }
    /* 全景模式下隐藏视频层 */
    body.pano-mode #video-container { display: none; }
    body.pano-mode #hotspot-layer   { display: none; }
    body.pano-mode #hud-footer      { z-index: 60; }

    /* 3D 模型热点按钮（model-viewer slot hotspot） */
    .pano-hs-btn {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-mono);
      padding: 7px 16px;
      white-space: nowrap;
      cursor: pointer;
      pointer-events: all;
      transform: translateX(-50%);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
      letter-spacing: 0.04em;
    }
    .pano-hs-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: translateX(-50%) scale(1.06);
      box-shadow: 0 6px 32px rgba(255,255,255,0.12);
    }

    /* model-viewer 默认控件样式 */
    /* model-viewer 全屏模式 */
    body.model3d-mode #phone-shell { background: #000; }
    body.model3d-mode .vid-active,
    body.model3d-mode .vid-preload { display: none !important; }
    body.model3d-mode #hotspot-layer { display: none; }
    /* 3D 热点按钮 (model-viewer slot) */
    .hotspot-3d-btn {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px) saturate(1.6);
      -webkit-backdrop-filter: blur(14px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s ease, background 0.15s ease;
      letter-spacing: 0.02em;
    }
    .hotspot-3d-btn:hover {
      background: rgba(255,255,255,0.22);
      transform: scale(1.06);
      box-shadow: 0 0 16px rgba(255,255,255,0.3);
    }
    /* model-viewer 进度条 */
    .progress-bar {
      display: block;
      width: 33%;
      height: 3px;
      max-height: 3px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 25%;
      box-shadow: 0px 3px 10px 3px rgba(0,0,0,0.5),
                  0px 0px 5px 1px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3);
    }
    .update-bar {
      background: rgba(255,255,255,0.9);
      width: 0%;
      height: 100%;
      border-radius: 25%;
      float: left;
      transition: width 0.3s;
    }
    .pnlm-controls-container { display: none !important; }
    .pnlm-load-box { display: none !important; }
  </style>
</head>
<body>

<div id="phone-shell">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-logo">
      <span class="logo-en">STELLAR HEIR</span>
      <span class="logo-zh">星之继承者</span>
    </div>
    <div class="loading-bar-wrap">
      <div class="loading-bar-fill"></div>
    </div>
    <span class="loading-text">INITIALIZING SYSTEM ···</span>
  </div>

  <!-- Error Screen -->
  <div id="error-screen">
    <span class="error-code">ERR · DATA_LINK_FAILURE</span>
    <p class="error-msg">无法连接至游戏数据服务器<br>请确认后端服务已启动</p>
  </div>

  <!-- Tap-to-Start Overlay (mobile autoplay gate) -->
  <div id="tap-start-overlay">
    <div class="tap-start-icon">▶</div>
    <span class="tap-start-label">TAP TO BEGIN · 点击开始</span>
    <span class="tap-start-sublabel">STELLAR HEIR · 星之继承者</span>
  </div>

  <!-- HUD Header -->
  <div id="hud-header">
    <span id="hud-title">STELLAR HEIR</span>
    <span id="hud-status"><span class="dot"></span>SYS ONLINE</span>
  </div>

  <!-- Corner Brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Video Container — 所有 <video> 实例动态注入此处 -->
  <div id="video-container"></div>

  <!-- Hotspot Layer — 热点按鈕绝对定位于此层，覆盖视频画面 -->
  <div id="hotspot-layer">
    <!-- SVG 多边形热点层 -->
    <svg id="hotspot-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- 3D Model Container — model-viewer 容器（3d_model 节点时显示） -->
  <div id="model3d-container"></div>

  <!-- Ending Screen -->
  <div id="ending-screen">
    <span class="ending-tag" id="ending-tag-text"></span>
    <div class="ending-divider"></div>
    <h2 class="ending-title" id="ending-title-text"></h2>
    <p class="ending-desc" id="ending-desc-text"></p>
    <div class="ending-divider"></div>
    <button class="restart-btn" id="restart-btn">[ RESTART · 重新开始 ]</button>
  </div>

  <!-- HUD Footer -->
  <div id="hud-footer">
    <span id="node-label">NODE ···</span>
    <span id="time-display">00:00</span>
  </div>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
//  STELLAR HEIR · Video Pool Engine v3.0  (Hotspot Edition)
//
//  核心架构：
//    videoPool  Map<nodeId, HTMLVideoElement>
//      - 活跃视频：class="vid-active"，unmuted，可见，z-index:1
//      - 预加载视频：class="vid-preload"，muted，隐藏，后台缓冲
//
//  热点系统：
//    - #hotspot-layer 绝对覆盖视频容器
//    - 每个 choice 的 position.x / position.y（百分比）驱动按钮位置
//    - Glassmorphism 样式，hover 缩放 + 发光反馈
//    - 视频暂停时热点淡入，选择后热点立即淡出
//
//  移动端兼容：
//    - 初始 muted 绕过自动播放策略
//    - 若 play() 被拦截，显示 #tap-start-overlay，等待用户交互后重试
//    - playsInline + webkit-playsinline 保证 iOS Safari 内联播放
// ════════════════════════════════════════════════════════════════════════

// ── DOM Refs ──────────────────────────────────────────────────────────────────
const $loadingScreen  = document.getElementById('loading-screen');
const $errorScreen    = document.getElementById('error-screen');
const $tapStart       = document.getElementById('tap-start-overlay');
const $videoContainer = document.getElementById('video-container');
const $hotspotLayer   = document.getElementById('hotspot-layer');
const $hotspotSvg     = document.getElementById('hotspot-svg');
const $model3dContainer = document.getElementById('model3d-container');
const $endingScreen   = document.getElementById('ending-screen');
const $endingTag      = document.getElementById('ending-tag-text');
const $endingTitle    = document.getElementById('ending-title-text');
const $endingDesc     = document.getElementById('ending-desc-text');
const $restartBtn     = document.getElementById('restart-btn');
const $nodeLabel      = document.getElementById('node-label');
const $timeDisplay    = document.getElementById('time-display');

// ── Engine State ──────────────────────────────────────────────────────────────
const engine = {
  gameData:      null,   // 完整 JSON 数据
  currentNodeId: null,   // 当前活跃节点 ID
  activeVideo:   null,   // 当前活跃 <video> 元素引用
  choiceShown:   false,  // 是否已弹出热点选项
  branchHandled: false,  // 是否已触发分支（防重入）
  transitioning: false,  // 是否正在切换节点（防重复点击）
  userInteracted: false, // 用户是否已交互（解锁音频）
};

// ── Video Pool ─────────────────────────────────────────────────────────────────
// Map<nodeId: string, video: HTMLVideoElement>
const videoPool = new Map();

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = Math.floor(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function hideLoading() {
  $loadingScreen.classList.add('hidden');
  // 确保 loading 完全消失，不遮挡 tap-start-overlay 和视频
  setTimeout(() => { $loadingScreen.style.display = 'none'; }, 700);
}

function showError() {
  $errorScreen.classList.add('visible');
  hideLoading();
}

// ── Fetch Game Data ────────────────────────────────────────────────────────────
async function fetchGameData() {
  try {
    const res = await fetch('/api/game-data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (err) {
    console.error('[VideoPool] fetchGameData failed:', err);
    return null;
  }
}

// ── Create a Video Element ─────────────────────────────────────────────────────
/**
 * 工厂函数：创建标准化 <video> 实例并注入 video-container。
 * @param {string}  nodeId - 对应节点 ID
 * @param {string}  url    - 视频 URL
 * @param {boolean} hidden - true=预加载（隐藏）；false=活跃（可见）
 */
function createVideoElement(nodeId, url, hidden) {
  const v = document.createElement('video');
  v.dataset.nodeId = nodeId;
  v.src            = url;
  v.preload        = 'auto';
  v.playsInline    = true;
  v.setAttribute('webkit-playsinline', '');
  v.muted          = true;   // 初始静音，绕过自动播放策略
  v.className      = hidden ? 'vid-preload' : 'vid-active';

  v.addEventListener('error', (e) => {
    console.error(`[VideoPool] Video error on node ${nodeId}:`, e);
  });

  $videoContainer.appendChild(v);
  v.load();

  console.log(`[VideoPool] Created <video> for node="${nodeId}" hidden=${hidden}`);
  return v;
}

// ── Preload Node ───────────────────────────────────────────────────────────────
function preloadNode(nodeId) {
  if (videoPool.has(nodeId)) return;

  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.warn(`[VideoPool] Preload target not found: ${nodeId}`);
    return;
  }

  // panorama 和 3d_model 节点不需要视频预加载
  if (node.type === 'panorama' || node.type === '3d_model') return;

  const v = createVideoElement(nodeId, node.video_url, true);
  videoPool.set(nodeId, v);
  console.log(`[VideoPool] Preloading: ${nodeId} → ${node.video_url}`);

  v.addEventListener('canplaythrough', () => {
    console.log(`[VideoPool] Ready: ${nodeId}`);
    markHotspotReady(nodeId);
  }, { once: true });
}

// ── Release Stale Videos ───────────────────────────────────────────────────────
function releaseStaleVideos(keepIds) {
  for (const [nodeId, v] of videoPool.entries()) {
    if (!keepIds.has(nodeId)) {
      console.log(`[VideoPool] Releasing: ${nodeId}`);
      v.pause();
      v.removeAttribute('src');
      v.load();
      v.remove();
      videoPool.delete(nodeId);
    }
  }
}

// ── Activate Video ─────────────────────────────────────────────────────────────
async function activateVideo(v) {
  v.className   = 'vid-active';
  v.currentTime = 0;

  if (engine.userInteracted) {
    v.muted = false;
  }

  try {
    await v.play();
    // 播放成功后若用户已交互则确保取消静音
    if (engine.userInteracted) v.muted = false;
  } catch (err) {
    console.warn('[VideoPool] play() blocked:', err.message);
    // 静音重试
    v.muted = true;
    try {
      await v.play();
      // 显示 tap-to-start 遮罩，等待用户点击解锁音频
      showTapStart();
    } catch (e) {
      console.error('[VideoPool] Muted play also blocked:', e);
      showTapStart();
    }
  }
}

// ── Deactivate Video ───────────────────────────────────────────────────────────
function deactivateVideo(v) {
  v.className = 'vid-fadeout';
  v.pause();
  setTimeout(() => {
    if (v.parentNode) {
      v.pause();
      v.removeAttribute('src');
      v.load();
      v.remove();
    }
  }, 250);
}

// ── Tap-to-Start (mobile autoplay gate) ───────────────────────────────────────
function showTapStart() {
  if ($tapStart.classList.contains('visible')) return;
  $tapStart.classList.add('visible');
}
function hideTapStart() {
  $tapStart.classList.remove('visible');
}
function unlockAudio() {
  if (engine.userInteracted) return;
  engine.userInteracted = true;
  hideTapStart();
  if (engine.activeVideo) {
    engine.activeVideo.muted = false;
    engine.activeVideo.play().catch(() => {});
  }
}
$tapStart.addEventListener('click', unlockAudio);
// 手机端备用：任意 touch 也解锁音频
$tapStart.addEventListener('touchstart', unlockAudio, { passive: true });

// ── Load Node (Main Entry) ─────────────────────────────────────────────────────
async function loadNode(nodeId) {
  const node = engine.gameData.nodes[nodeId];
  if (!node) {
    console.error('[VideoPool] loadNode: node not found:', nodeId);
    return;
  }

  engine.currentNodeId  = nodeId;
  engine.choiceShown    = false;
  engine.branchHandled  = false;
  engine.transitioning  = false;
  engine.videoEnded     = false; // 重置视频结束标志，新节点正常控制热点显隐

  // 重置 UI
  hideHotspots();
  $endingScreen.classList.remove('visible');
  $nodeLabel.textContent = `NODE · ${nodeId.replace('_', ' ')}`;

  // ── 分流：3d_model 节点走 model-viewer 引擎 ─────────────────────────────
  if (node.type === '3d_model') {
    exitPanoramaMode();
    await load3DModelNode(node);
    return;
  }

  // ── 分流：panorama 节点走全景图引擎 ─────────────────────────────────────
  if (node.type === 'panorama') {
    exit3DModelMode();
    await loadPanoramaNode(node);
    return;
  }

  // ── 退出 3D 模式和全景图模式（如果之前是 3D 模型或全景图）────────────────
  exit3DModelMode();
  exitPanoramaMode();

  // ── 步骤 1：获取或创建目标视频 ──────────────────────────────────────────
  let targetVideo;
  if (videoPool.has(nodeId)) {
    targetVideo = videoPool.get(nodeId);
    console.log(`[VideoPool] Cache HIT: ${nodeId} — seamless switch!`);
  } else {
    targetVideo = createVideoElement(nodeId, node.video_url, false);
    videoPool.set(nodeId, targetVideo);
    console.log(`[VideoPool] Cache MISS: ${nodeId} — cold start`);
  }

  // ── 步骤 2：淡出旧视频，激活新视频 ─────────────────────────────────────
  if (engine.activeVideo && engine.activeVideo !== targetVideo) {
    deactivateVideo(engine.activeVideo);
  }

  engine.activeVideo = targetVideo;
  await activateVideo(targetVideo);

  // 绑定事件（每次激活后重新绑定，避免多实例事件冲突）
  targetVideo.addEventListener('timeupdate', onTimeUpdate);
  targetVideo.addEventListener('seeked',     onSeeked);
  targetVideo.addEventListener('ended',      onEnded);

  // ── 步骤 3：立即预加载所有分支目标（含全景节点）──────────────────────────
  const keepIds = new Set([nodeId]);
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach(choice => {
      const targetNode = engine.gameData.nodes[choice.target_node];
      keepIds.add(choice.target_node);
      if (targetNode && targetNode.type === '3d_model') {
        preload3DModel(choice.target_node);
      } else {
        preloadNode(choice.target_node);
      }
    });
  }

  // ── 步骤 4：释放不在保留集合中的旧视频 ──────────────────────────────────
  releaseStaleVideos(keepIds);
}

// ── timeupdate Handler ─────────────────────────────────────────────────────────
function onTimeUpdate() {
  if (this !== engine.activeVideo) return;
  const t = this.currentTime;
  $timeDisplay.textContent = formatTime(t);
  maybeTriggerBranch(t);
}

// ── seeked Handler ─────────────────────────────────────────────────────────────
function onSeeked() {
  if (this !== engine.activeVideo) return;
  maybeTriggerBranch(this.currentTime);
}

// ── ended Handler ─────────────────────────────────────────────────────────────
function onEnded() {
  if (this !== engine.activeVideo) return;
  engine.videoEnded = true; // 标记视频已结束，阻止 updateHotspotVisibility 继续隐藏热点
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (node && node.type === 'ending') {
    showEnding(node);
  } else if (node && node.type === 'branching') {
    // 视频结束，强制显示所有热点（忽略 timeWindow 限制，用户必须做出选择）
    showChoices(node);
  } else if (node && node.next_node && engine.gameData.nodes[node.next_node]) {
    // 直连节点：视频播完自动跳转到 next_node
    loadNode(node.next_node);
  }
}

// ── Branch Trigger ─────────────────────────────────────────────────────────────────
/**
 * 每帧 timeupdate 时调用。
 * 1. 到达最早的 timeWindow 开始时间（或 branch_at_second）时首次触发 showChoices
 * 2. 后续每帧根据各 choice.timeWindow 实时控制热点显隐
 */
function maybeTriggerBranch(currentTime) {
  // 新逻辑：不在播放中途创建/显示按钮，不暂停视频。
  // 按钮展示完全由 onEnded 负责，此函数仅保留以供将来扩展。
  void currentTime;
}

/**
 * 根据 当前播放时间 和 各 choice.timeWindow 实时控制热点显隐
 */
function updateHotspotVisibility(node, currentTime) {
  node.choices.forEach((choice, idx) => {
    const tw = choice.timeWindow;
    if (!tw || !Array.isArray(tw) || tw.length < 2) return; // 无 timeWindow 则始终显示
    const visible = currentTime >= tw[0] && currentTime <= tw[1];

    if (choice.type === 'polygon') {
      // SVG 多边形热点
      const poly = $hotspotSvg.querySelector(`[data-choice-idx="${idx}"]`);
      if (poly) poly.style.display = visible ? '' : 'none';
    } else {
      // 文字按鈕热点
      const btn = $hotspotLayer.querySelector(`[data-choice-idx="${idx}"]`);
      if (btn) btn.style.display = visible ? '' : 'none';
    }
  });
}

// ── Show Choices (Hotspot Rendering) ──────────────────────────────────────────────
/**
 * 在 #hotspot-layer 中动态创建热点。
 * - 文字热点：<button class="hotspot-btn"> 绝对定位
 * - 多边形热点：<polygon> 渲染到 #hotspot-svg，百分比坐标系
 * - timeWindow 存在时，初始根据当前时间决定是否显示
 */
function showChoices(node) {
  // 简化逻辑：始终显示所有按钮，不依赖 timeWindow
  // 此函数只应在视频结束（onEnded）后调用
  if (engine.choiceShown) return; // 防重入
  engine.choiceShown = true;

  // 清空旧按钮 DOM
  $hotspotLayer.querySelectorAll('.hotspot-btn').forEach(el => el.remove());
  $hotspotSvg.innerHTML = '';

  node.choices.forEach((choice, idx) => {
    if (choice.type === 'polygon' && choice.points && choice.points.length >= 3) {
      // ── 多边形热点 ───────────────────────────────────────────────────────────────────
      const pts = choice.points
        .map(p => `${parseFloat(p.x)},${parseFloat(p.y)}`)
        .join(' ');
      const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      polygon.setAttribute('points', pts);
      polygon.setAttribute('vector-effect', 'non-scaling-stroke');
      polygon.classList.add('poly-hotspot');
      polygon.dataset.choiceIdx = idx;
      polygon.dataset.targetNode = choice.target_node || '';
      polygon.title = choice.label || '';
      $hotspotSvg.setAttribute('viewBox', '0 0 100 100');
      $hotspotSvg.setAttribute('preserveAspectRatio', 'none');
      $hotspotSvg.style.pointerEvents = 'none';
      polygon.addEventListener('click', () => handleChoice(choice));
      $hotspotSvg.appendChild(polygon);
    } else {
      // ── 文字按钮热点 ────────────────────────────────────────────────────────────────────────
      const btn = document.createElement('button');
      btn.className = 'hotspot-btn';
      btn.dataset.targetNode = choice.target_node || '';
      btn.dataset.choiceIdx = idx;

      const pos = choice.position || {};
      const px  = pos.x || defaultHotspotX(idx, node.choices.length);
      const py  = pos.y || defaultHotspotY(idx, node.choices.length);
      btn.style.left = px;
      btn.style.top  = py;
      // 按钮始终可见，不依赖 timeWindow
      btn.style.display = '';

      btn.innerHTML = `
        <span class="hs-ready-dot"></span>
        <span class="hs-label">${choice.label || ''}</span>
      `;

      const preloadedVid = videoPool.get(choice.target_node);
      if (preloadedVid && preloadedVid.readyState >= 4) btn.classList.add('is-ready');

      btn.addEventListener('click', () => handleChoice(choice));
      $hotspotLayer.appendChild(btn);
    }
  });

  // 淡入热点层
  $hotspotLayer.classList.add('visible');
  // 视频已结束，暂停确保按钮可点击（防止视频自动循环）
  if (engine.activeVideo) engine.activeVideo.pause();
}

// ── Hide Hotspots ─────────────────────────────────────────────────────────────────
function hideHotspots() {
  $hotspotLayer.classList.remove('visible');
  // 等动画结束后清空 DOM，避免闪烁
  setTimeout(() => {
    if (!$hotspotLayer.classList.contains('visible')) {
      $hotspotLayer.innerHTML = '';
    }
  }, 420);
}

// ── Default Hotspot Positions (fallback) ──────────────────────────────────────
/**
 * 当 choice.position 未定义时，按垂直居中均匀分布作为回退。
 */
function defaultHotspotX(idx, total) {
  return '50%';
}

function defaultHotspotY(idx, total) {
  // 在 55%–80% 区间内均匀分布
  const start = 55, end = 80;
  if (total === 1) return `${(start + end) / 2}%`;
  const step = (end - start) / (total - 1);
  return `${(start + idx * step).toFixed(1)}%`;
}

// ── Mark Hotspot Ready ─────────────────────────────────────────────────────────
function markHotspotReady(nodeId) {
  const btn = $hotspotLayer.querySelector(`[data-target-node="${nodeId}"]`);
  if (btn) btn.classList.add('is-ready');
}

// ── Handle Choice ──────────────────────────────────────────────────────────────
function handleChoice(choice) {
  if (engine.transitioning) return;
  engine.transitioning = true;

  // 立即隐藏热点层
  hideHotspots();

  // 移除旧视频的事件监听（防止事件泄漏）
  if (engine.activeVideo) {
    engine.activeVideo.removeEventListener('timeupdate', onTimeUpdate);
    engine.activeVideo.removeEventListener('seeked',     onSeeked);
    engine.activeVideo.removeEventListener('ended',      onEnded);
  }

  // 直接切换到预加载好的视频（无黑屏等待）
  loadNode(choice.target_node);
}

// ── Show Ending ────────────────────────────────────────────────────────────────
function showEnding(node) {
  $endingTag.textContent   = node.ending_tag  || 'ENDING';
  $endingTitle.textContent = node.title        || '';
  $endingDesc.textContent  = node.description  || '';
  $endingScreen.classList.add('visible');
}

// ── Keyboard Shortcuts ─────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (!engine.choiceShown) return;
  const node = engine.gameData.nodes[engine.currentNodeId];
  if (!node) return;
  const choice = node.choices.find(c => c.hotkey === e.key);
  if (choice) handleChoice(choice);
});

// ── Restart ────────────────────────────────────────────────────────────────────
$restartBtn.addEventListener('click', () => {
  $endingScreen.classList.remove('visible');
  hideHotspots();

  // 清空整个 pool，重新冷启动
  for (const [, v] of videoPool.entries()) {
    v.pause();
    v.removeAttribute('src');
    v.load();
    v.remove();
  }
  videoPool.clear();
  engine.activeVideo = null;

  // 只有用户未交互过时才需要显示 tap-start-overlay
  // 已交互过的用户重生时直接播放，不需要再次点击解锁
  if (!engine.userInteracted) {
    showTapStart();
  }
  loadNode(engine.gameData.start_node);
});
// ── Initt ───────────────────────────────────────────────────────────────────────
async function init() {
  // 短暂 loading 动画
  await new Promise(r => setTimeout(r, 1400));

  const data = await fetchGameData();
  if (!data) {
    showError();
    return;
  }

  engine.gameData = data;
  hideLoading();
  // 手机端：主动显示 tap-to-start，确保用户第一次交互就能解锁音频
  showTapStart();
  loadNode(data.start_node);
}

init();

// ══════════════════════════════════════════════════════════════════════════════
//  3D MODEL ENGINE  (model-viewer based)
//  支持 3d_model 类型节点：.glb 模型预加载、model-viewer 初始化、3D 热点渲染
// ══════════════════════════════════════════════════════════════════════════════
// 当前 model-viewer 实例
let currentModelViewer = null;
// 预加载 3D 模型（通过 fetch 将 .glb 拉入浏览器缓存）
const model3dCache = new Set(); // 已预加载的 nodeId
function preload3DModel(nodeId) {
  if (model3dCache.has(nodeId)) return;
  const node = engine.gameData.nodes[nodeId];
  if (!node || node.type !== '3d_model' || !node.model_url) return;
  // 使用 fetch 将 .glb 文件拉入 HTTP 缓存
  fetch(node.model_url, { mode: 'no-cors' }).catch(() => {});
  model3dCache.add(nodeId);
  console.log(`[3DEngine] Preloading model: ${nodeId} → ${node.model_url}`);
}
// 进入 3D 模型模式
async function load3DModelNode(node) {
  // 暂停并隐藏所有视频
  if (engine.activeVideo) {
    engine.activeVideo.pause();
    engine.activeVideo = null;
  }
  document.body.classList.add('model3d-mode');
  $model3dContainer.classList.add('visible');
  // 销毁旧的 model-viewer 实例
  if (currentModelViewer) {
    currentModelViewer.remove();
    currentModelViewer = null;
  }
  $model3dContainer.innerHTML = '';
  const modelUrl = node.model_url || '';
  if (!modelUrl) {
    $model3dContainer.innerHTML = '<div style="color:#fff;padding:40px;text-align:center;">暂无 3D 模型，请在编辑器中上传</div>';
    return;
  }
  // 创建 model-viewer 元素
  const mv = document.createElement('model-viewer');
  mv.setAttribute('src', modelUrl);
  mv.setAttribute('camera-controls', '');
  mv.setAttribute('auto-rotate', '');
  mv.setAttribute('shadow-intensity', '1');
  mv.setAttribute('exposure', '1');
  mv.setAttribute('environment-image', 'neutral');
  mv.setAttribute('loading', 'eager');
  mv.setAttribute('reveal', 'auto');
  if (node.camera_orbit) {
    mv.setAttribute('camera-orbit', node.camera_orbit);
  }
  // 加载进度条
  mv.innerHTML = `
    <div class="progress-bar" slot="progress-bar">
      <div class="update-bar"></div>
    </div>
  `;
  mv.style.cssText = 'width:100%;height:100%;background:#000;';
  // 渲染 3D 热点
  if (node.choices && node.choices.length > 0) {
    node.choices.forEach((choice, idx) => {
      const pos    = choice.position || '0 0 0';
      const normal = choice.normal   || '0 1 0';
      // 创建热点 slot
      const btn = document.createElement('button');
      btn.slot = `hotspot-${idx}`;
      btn.setAttribute('data-position', pos);
      btn.setAttribute('data-normal', normal);
      btn.className = 'hotspot-3d-btn';
      btn.textContent = choice.label || `选项 ${idx + 1}`;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        handleChoice(choice);
      });
      mv.appendChild(btn);
    });
  }
  $model3dContainer.appendChild(mv);
  currentModelViewer = mv;
  // 预加载分支目标
  if (node.choices) {
    node.choices.forEach(c => {
      const target = engine.gameData.nodes[c.target_node];
      if (target && target.type === '3d_model') {
        preload3DModel(c.target_node);
      } else if (target) {
        preloadNode(c.target_node);
      }
    });
  }
  console.log(`[3DEngine] Model loaded: ${node.model_url}`);
}
// 退出 3D 模式，恢复视频模式
function exit3DModelMode() {
  if (!document.body.classList.contains('model3d-mode')) return;
  document.body.classList.remove('model3d-mode');
  $model3dContainer.classList.remove('visible');
  if (currentModelViewer) {
    currentModelViewer.remove();
    currentModelViewer = null;
  }
  $model3dContainer.innerHTML = '';
}

// ══════════════════════════════════════════════════════════════════════════════
//  PANORAMA ENGINE  (360° equirectangular viewer)
//  支持 panorama 类型节点：全景图拖拽旋转、热点按钮渲染
// ══════════════════════════════════════════════════════════════════════════════

// 全景图容器（动态创建）
let $panoContainer = null;
let panoState = { dragging: false, startX: 0, startY: 0, rotX: 0, rotY: 0, curRotX: 0, curRotY: 0 };

// 进入全景图模式
async function loadPanoramaNode(node) {
  // 暂停并隐藏所有视频
  if (engine.activeVideo) {
    engine.activeVideo.pause();
    engine.activeVideo = null;
  }

  // 确保全景图容器存在
  if (!$panoContainer) {
    $panoContainer = document.createElement('div');
    $panoContainer.id = 'pano-container';
    $panoContainer.style.cssText = 'position:absolute;inset:0;z-index:5;display:none;overflow:hidden;background:#000;';
    document.getElementById('phone-shell').appendChild($panoContainer);
  }

  document.body.classList.add('pano-mode');
  $panoContainer.style.display = 'block';
  $panoContainer.innerHTML = '';
  panoState = { dragging: false, startX: 0, startY: 0, rotX: 0, rotY: 0, curRotX: 0, curRotY: 0 };

  const panoUrl = node.panorama_url || '';
  if (!panoUrl) {
    $panoContainer.innerHTML = '<div style="color:#fff;padding:40px;text-align:center;font-family:monospace;letter-spacing:0.1em;">暂无全景图<br/>请在编辑器中设置全景图 URL</div>';
    // 仍然渲染选项按钮
    renderPanoChoices(node);
    return;
  }

  // 创建全景图查看器（CSS 3D 球体投影近似）
  const viewer = document.createElement('div');
  viewer.style.cssText = 'position:absolute;inset:0;overflow:hidden;cursor:grab;';
  
  const imgWrap = document.createElement('div');
  imgWrap.style.cssText = 'position:absolute;width:200%;height:100%;left:-50%;transform-origin:center center;transition:none;';
  
  const img = document.createElement('img');
  img.src = panoUrl;
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none;';
  img.draggable = false;
  
  imgWrap.appendChild(img);
  viewer.appendChild(imgWrap);
  $panoContainer.appendChild(viewer);

  // 拖拽旋转交互
  let isDragging = false, lastX = 0, lastY = 0;
  let offsetX = 0, offsetY = 0; // 水平偏移百分比（0~100 对应全景图一圈）

  function updatePanoView() {
    // 水平循环滚动（equirectangular 投影）
    const clampedY = Math.max(-30, Math.min(30, offsetY));
    imgWrap.style.transform = `translateX(${offsetX % 100}%) translateY(${clampedY}px)`;
  }

  viewer.addEventListener('mousedown', (e) => {
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
    viewer.style.cursor = 'grabbing';
    e.preventDefault();
  });
  viewer.addEventListener('touchstart', (e) => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  const onMove = (x, y) => {
    if (!isDragging) return;
    const dx = x - lastX;
    const dy = y - lastY;
    lastX = x; lastY = y;
    // 水平拖拽 → 全景图水平偏移（1px = 0.05% 偏移）
    offsetX -= dx * 0.05;
    offsetY += dy * 0.3;
    updatePanoView();
  };

  document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
  document.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

  const onEnd = () => {
    isDragging = false;
    viewer.style.cursor = 'grab';
  };
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);

  // 渲染热点选项
  renderPanoChoices(node);

  // 预加载分支目标
  if (node.choices) {
    node.choices.forEach(c => {
      const target = engine.gameData.nodes[c.target_node];
      if (target && target.type === '3d_model') {
        preload3DModel(c.target_node);
      } else if (target && target.type !== 'panorama') {
        preloadNode(c.target_node);
      }
    });
  }

  console.log(`[PanoEngine] Panorama loaded: ${node.panorama_url}`);
}

// 渲染全景图热点选项
function renderPanoChoices(node) {
  // 移除旧的热点层
  const oldLayer = $panoContainer ? $panoContainer.querySelector('.pano-choices-layer') : null;
  if (oldLayer) oldLayer.remove();

  if (!node.choices || !node.choices.length) return;

  const layer = document.createElement('div');
  layer.className = 'pano-choices-layer';
  layer.style.cssText = 'position:absolute;inset:0;z-index:10;pointer-events:none;';

  node.choices.forEach((choice, idx) => {
    const btn = document.createElement('button');
    btn.className = 'pano-hs-btn';
    btn.style.cssText = 'position:absolute;pointer-events:auto;transform:translate(-50%,-50%);';
    
    // 使用 choice.position 或默认位置
    const pos = choice.position || {};
    const px = pos.x || `${30 + idx * 20}%`;
    const py = pos.y || '70%';
    btn.style.left = px;
    btn.style.top = py;
    btn.textContent = choice.label || `选项 ${idx + 1}`;
    btn.addEventListener('click', () => handleChoice(choice));
    layer.appendChild(btn);
  });

  if ($panoContainer) $panoContainer.appendChild(layer);
}

// 退出全景图模式
function exitPanoramaMode() {
  if (!document.body.classList.contains('pano-mode')) return;
  document.body.classList.remove('pano-mode');
  if ($panoContainer) {
    $panoContainer.style.display = 'none';
    $panoContainer.innerHTML = '';
  }
}


</script>

<script>
// ═══════════════════════════════════════════════════════════════════
// GAME ENGINE — Player Runtime
// ═══════════════════════════════════════════════════════════════════

const gameState = {
  variables: {},   // id -> current value
  inventory: {},   // item_id -> count
  bubbles: 0,      // Bubble currency
  checkpointSave: null,
  endingsUnlocked: new Set(),
};

function gsInit(gameData) {
  if (!gameData.game_settings) return;
  const gs = gameData.game_settings;
  // Variables
  (gs.variables||[]).forEach(v => {
    gameState.variables[v.id] = v.initial !== undefined ? v.initial : (v.type==='boolean' ? false : 0);
  });
  // Bubbles from localStorage
  const stored = localStorage.getItem('gs_bubbles_' + (gameData.title||'game'));
  gameState.bubbles = stored !== null ? parseInt(stored) : 100;
  // Endings
  const storedEndings = localStorage.getItem('gs_endings_' + (gameData.title||'game'));
  if (storedEndings) {
    try { JSON.parse(storedEndings).forEach(e => gameState.endingsUnlocked.add(e)); } catch(e) {}
  }
  // Apply theme
  const shell = document.getElementById('phone-shell');
  if (shell && gs.theme) {
    shell.className = shell.className.replace(/theme-\S+/g,'').trim();
    shell.classList.add('theme-' + gs.theme);
  }
  renderHUD(gameData);
}

// ── HUD ──────────────────────────────────────────────────────────
function renderHUD(gameData) {
  const gs = gameData.game_settings;
  if (!gs) return;
  const vars = (gs.variables||[]).filter(v=>v.visible);
  const hasInventory = (gs.items||[]).length > 0;
  const hasShop = (gs.shop||[]).length > 0;
  const hasRelationships = (gs.variables||[]).some(v=>v.is_relationship);
  const hasEndings = (gs.endings||[]).length > 0;

  const hudEl = document.getElementById('game-hud');
  if (!hudEl) return;

  hudEl.querySelector('#hud-vars').innerHTML = vars.map(v =>
    `<span class="hud-var"><span>${v.icon||'📊'}</span><span class="hud-var-val" id="hud-var-${v.id}">${formatVarVal(v, gameState.variables[v.id])}</span></span>`
  ).join('');

  const btns = hudEl.querySelector('#hud-btns');
  btns.innerHTML = '';
  if (hasInventory) btns.innerHTML += `<div class="hud-icon-btn" onclick="openInventoryPanel()" title="背包">🎒</div>`;
  if (hasShop) btns.innerHTML += `<div class="hud-icon-btn" onclick="openShopPanel()" title="商城">🛒</div>`;
  if (hasRelationships) btns.innerHTML += `<div class="hud-icon-btn" onclick="openRelPanel()" title="关系">🤝</div>`;
  if (hasEndings) btns.innerHTML += `<div class="hud-icon-btn" onclick="openEndingsPanel()" title="结局">🏆</div>`;
  btns.style.pointerEvents = 'auto';
}

function formatVarVal(v, val) {
  if (v.type==='boolean') return val ? '✓' : '✗';
  return val !== undefined ? val : v.initial;
}

function updateHUDVar(varId, newVal) {
  const el = document.getElementById('hud-var-' + varId);
  if (!el) return;
  el.textContent = newVal;
  el.classList.remove('flash');
  void el.offsetWidth; // reflow
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 600);
}

// ── Execute Effects ───────────────────────────────────────────────
function executeEffects(effects, gameData) {
  if (!effects || !effects.length) return;
  const gs = gameData.game_settings;
  effects.forEach(e => {
    if (e.type === 'variable') {
      const varDef = (gs.variables||[]).find(v=>v.id===e.variable_id);
      if (!varDef) return;
      let cur = gameState.variables[e.variable_id] !== undefined ? gameState.variables[e.variable_id] : varDef.initial;
      if (e.operator==='add') cur = cur + e.value;
      else if (e.operator==='subtract') cur = cur - e.value;
      else if (e.operator==='set') cur = e.value;
      // Clamp to min/max
      if (varDef.type==='number') {
        if (varDef.min !== undefined) cur = Math.max(varDef.min, cur);
        if (varDef.max !== undefined) cur = Math.min(varDef.max, cur);
      }
      gameState.variables[e.variable_id] = cur;
      if (varDef.visible) updateHUDVar(e.variable_id, cur);
    } else if (e.type === 'item') {
      const itemDef = (gs.items||[]).find(i=>i.id===e.item_id);
      if (!itemDef) return;
      const cur = gameState.inventory[e.item_id] || 0;
      let newCount = e.action==='give' ? cur + (e.count||1) : Math.max(0, cur - (e.count||1));
      if (itemDef.stackable && itemDef.max_count) newCount = Math.min(newCount, itemDef.max_count);
      if (!itemDef.stackable) newCount = Math.min(newCount, 1);
      gameState.inventory[e.item_id] = newCount;
      if (e.action==='give') showItemAcquireAnim(itemDef);
    }
  });
}

function showItemAcquireAnim(itemDef) {
  const shell = document.getElementById('phone-shell');
  const el = document.createElement('div');
  el.className = 'item-float-anim';
  el.textContent = (itemDef.icon||'📦') + ' +1';
  el.style.cssText = 'left:50%;top:60%;font-size:18px;color:#fff;';
  shell.appendChild(el);
  setTimeout(() => el.remove(), 1500);
}

// ── Evaluate Conditions ────────────────────────────────────────────
function evalConditions(conditions) {
  if (!conditions || !conditions.length) return { pass: true };
  for (const c of conditions) {
    let lhs, rhs = c.value;
    if (c.type==='item' || c.item_id) {
      lhs = gameState.inventory[c.item_id] || 0;
    } else {
      lhs = gameState.variables[c.variable_id] !== undefined ? gameState.variables[c.variable_id] : 0;
    }
    let pass = false;
    if (c.operator==='gte'||c.operator==='ge') pass = lhs >= rhs;
    else if (c.operator==='lte'||c.operator==='le') pass = lhs <= rhs;
    else if (c.operator==='eq'||c.operator==='=') pass = lhs == rhs;
    else if (c.operator==='ne') pass = lhs != rhs;
    else if (c.operator==='is') pass = !!lhs;
    else if (c.operator==='not') pass = !lhs;
    if (!pass) return { pass: false, fail_behavior: c.fail_behavior||'locked', fail_message: c.fail_message||'条件不满足' };
  }
  return { pass: true };
}

// ── Check Death Conditions ────────────────────────────────────────
function checkDeathConditions(gameData) {
  const gs = gameData.game_settings;
  const rr = gs && gs.respawn_rules;
  if (!rr || !rr.death_conditions || !rr.death_conditions.length) return;
  for (const dc of rr.death_conditions) {
    const val = gameState.variables[dc.variable_id] !== undefined ? gameState.variables[dc.variable_id] : 0;
    let dead = false;
    if (dc.operator==='lte') dead = val <= dc.value;
    else if (dc.operator==='gte') dead = val >= dc.value;
    else if (dc.operator==='eq') dead = val == dc.value;
    if (dead) { triggerDeath(rr, gameData); return; }
  }
}

function triggerDeath(rr, gameData) {
  const screen = document.getElementById('death-screen');
  if (!screen) return;
  document.querySelector('.death-msg').textContent = rr.death_message || '你已经倒下了...';
  // Revive item button
  const reviveBtn = document.getElementById('death-revive-btn');
  if (reviveBtn) {
    const reviveItem = rr.revive_item_id ? (gameData.game_settings.items||[]).find(i=>i.id===rr.revive_item_id) : null;
    const count = rr.revive_item_id ? (gameState.inventory[rr.revive_item_id]||0) : 0;
    if (reviveItem && count > 0) {
      reviveBtn.style.display='block';
      reviveBtn.textContent = `💊 使用 ${reviveItem.icon} ${reviveItem.name} (×${count}) — 保留进度`;
    } else {
      reviveBtn.style.display='none';
    }
  }
  if (engine.activeVideo) engine.activeVideo.pause();
  screen.classList.add('visible');
}

function respawnFromCheckpoint(gameData) {
  const screen = document.getElementById('death-screen');
  screen.classList.remove('visible');
  const rr = gameData.game_settings.respawn_rules;
  const reviveId = rr && rr.revive_item_id;
  if (reviveId) gameState.inventory[reviveId] = Math.max(0,(gameState.inventory[reviveId]||1)-1);
  if (gameState.checkpointSave) {
    const save = gameState.checkpointSave;
    Object.assign(gameState.variables, save.variables);
    Object.assign(gameState.inventory, save.inventory);
    renderHUD(gameData);
    loadNode(save.node_id);
  } else {
    respawnFromStart(gameData);
  }
}
function respawnFromStart(gameData) {
  const screen = document.getElementById('death-screen');
  screen.classList.remove('visible');
  gsInit(gameData);
  loadNode(gameData.start_node);
}

function saveCheckpoint(nodeId, gameData) {
  gameState.checkpointSave = {
    node_id: nodeId,
    variables: {...gameState.variables},
    inventory: {...gameState.inventory},
  };
  const title = gameData.title||'game';
  localStorage.setItem('gs_checkpoint_'+title, JSON.stringify(gameState.checkpointSave));
}

// ── Slide-up Panels ────────────────────────────────────────────────
function openInventoryPanel() {
  const gs = engine.gameData.game_settings;
  const items = (gs&&gs.items)||[];
  const rows = items.map(it => {
    const count = gameState.inventory[it.id]||0;
    return `<div class="gsp-item">
      <span class="gsp-item-icon">${it.icon||'📦'}</span>
      <div class="gsp-item-info"><div class="gsp-item-name">${it.name}</div><div class="gsp-item-count">${it.description||''}</div></div>
      <span class="gsp-item-qty">×${count}</span>
    </div>`;
  }).join('');
  openGameSlidePanel('🎒 背包', rows||'<div style="color:#4a6070;font-size:12px;text-align:center;padding:20px;">背包是空的</div>');
}

function openRelPanel() {
  const gs = engine.gameData.game_settings;
  const relVars = (gs&&gs.variables||[]).filter(v=>v.is_relationship);
  const rows = relVars.map(v => {
    const cur = gameState.variables[v.id]||0;
    const max = v.max||100;
    const pct = Math.round(Math.min(100, Math.max(0, (cur/max)*100)));
    const avatarHtml = v.character_avatar
      ? `<img src="${v.character_avatar}" alt="${v.name}"/>`
      : `<span style="font-size:18px;">${v.icon||'👤'}</span>`;
    return `<div class="rel-row">
      <div class="rel-avatar">${avatarHtml}</div>
      <div class="rel-info">
        <div class="rel-name">${v.name}</div>
        <div style="display:flex;align-items:center;">
          <div class="rel-bar-bg" style="flex:1;"><div class="rel-bar-fill" style="width:${pct}%"></div></div>
          <span class="rel-val">${cur}/${max}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  openGameSlidePanel('🤝 关系', rows||'<div style="color:#4a6070;font-size:12px;text-align:center;padding:20px;">暂无关系数据</div>');
}

function openShopPanel() {
  const gs = engine.gameData.game_settings;
  const shop = (gs&&gs.shop)||[];
  const items = (gs&&gs.items)||[];
  const rows = shop.map(s => {
    const it = items.find(i=>i.id===s.item_id)||{name:s.item_id,icon:'📦',description:''};
    const canAfford = gameState.bubbles >= s.price_bubbles;
    const purchased = gameState.inventory[s.item_id]||0;
    const maxReached = s.max_per_game && purchased >= s.max_per_game;
    return `<div class="shop-item-card">
      <span style="font-size:22px;">${it.icon}</span>
      <div style="flex:1;">
        <div style="font-size:12px;color:#c8d8e8;font-weight:500;">${it.name}</div>
        <div style="font-size:10px;color:#4a6070;">${s.description||it.description||''}</div>
        ${s.max_per_game?`<div style="font-size:10px;color:#4a6070;">已购 ${purchased}/${s.max_per_game}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="shop-item-price">🫧 ${s.price_bubbles}</span>
        <button class="shop-buy-btn" ${(!canAfford||maxReached)?'disabled':''} onclick="purchaseShopItem('${s.item_id}',${s.price_bubbles},${JSON.stringify(s.max_per_game)})">
          ${maxReached?'已达上限':(!canAfford?'余额不足':'购买')}
        </button>
      </div>
    </div>`;
  }).join('');
  const balanceHtml = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><span style="font-size:12px;color:#4a6070;">我的 Bubbles</span><span style="font-size:16px;color:#00d4ff;font-weight:600;" id="shop-balance-display">🫧 ${gameState.bubbles}</span></div>`;
  openGameSlidePanel('🛒 商城', balanceHtml + (rows||'<div style="color:#4a6070;text-align:center;padding:20px;">暂无商品</div>'));
}

async function purchaseShopItem(itemId, price, maxPerGame) {
  if (gameState.bubbles < price) { showGameToast('Bubbles 不足'); return; }
  const purchased = gameState.inventory[itemId]||0;
  if (maxPerGame && purchased >= maxPerGame) { showGameToast('已达购买上限'); return; }
  // Call server
  try {
    const res = await fetch('/api/shop/purchase', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({item_id:itemId, price_bubbles:price, world_title: engine.gameData.title||'game'})
    });
    const data = await res.json();
    if (data.success) {
      gameState.bubbles = data.new_balance;
      gameState.inventory[itemId] = (gameState.inventory[itemId]||0) + 1;
      const balEl = document.getElementById('shop-balance-display');
      if (balEl) balEl.textContent = '🫧 ' + gameState.bubbles;
      showGameToast('购买成功！');
      openShopPanel(); // refresh
    } else {
      showGameToast(data.error||'购买失败');
    }
  } catch(e) {
    // Offline fallback
    gameState.bubbles -= price;
    gameState.inventory[itemId] = (gameState.inventory[itemId]||0) + 1;
    const title = engine.gameData.title||'game';
    localStorage.setItem('gs_bubbles_'+title, gameState.bubbles);
    showGameToast('购买成功！(离线)');
    openShopPanel();
  }
}

function openEndingsPanel() {
  const gs = engine.gameData.game_settings;
  const endings = (gs&&gs.endings)||[];
  const total = endings.length;
  const unlocked = [...gameState.endingsUnlocked];
  const rows = endings.map(e => {
    const isUnlocked = gameState.endingsUnlocked.has(e.id);
    const badge = e.rarity==='legendary'?'⭐':e.rarity==='rare'?'💫':'✅';
    return `<div class="ending-collect-row">
      <span class="ending-badge">${isUnlocked?badge:'🔒'}</span>
      <div>
        <div class="ending-info-name">${isUnlocked?e.name:'???'}</div>
        <div class="ending-info-sub">${isUnlocked?e.description||'':e.unlock_hint||''}</div>
      </div>
    </div>`;
  }).join('');
  openGameSlidePanel(`🏆 结局收集 ${unlocked.length}/${total}`, rows||'<div style="color:#4a6070;text-align:center;padding:20px;">暂无结局配置</div>');
}

function openGameSlidePanel(title, contentHtml) {
  const overlay = document.getElementById('game-panel-overlay');
  document.getElementById('game-slide-title').textContent = title;
  document.getElementById('game-slide-content').innerHTML = contentHtml;
  overlay.classList.add('open');
}
function closeGameSlidePanel() {
  document.getElementById('game-panel-overlay').classList.remove('open');
}

function showGameToast(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;font-size:11px;padding:6px 14px;border-radius:20px;z-index:300;white-space:nowrap;font-family:var(--font-mono);';
  el.textContent = msg;
  document.getElementById('phone-shell').appendChild(el);
  setTimeout(() => el.remove(), 2000);
}

// ── Countdown Engine ───────────────────────────────────────────────
const countdownTimers = {};
function startCountdown(btn, choice, gameData) {
  const cd = choice.countdown;
  if (!cd || !cd.seconds) return;
  const secs = cd.seconds;
  let remaining = secs;
  const SVG_SIZE = 32, R = 14, CIRC = 2*Math.PI*R;
  const ring = document.createElement('div');
  ring.className = 'countdown-ring';
  ring.innerHTML = `<svg width="${SVG_SIZE}" height="${SVG_SIZE}" viewBox="0 0 ${SVG_SIZE} ${SVG_SIZE}">
    <circle cx="${SVG_SIZE/2}" cy="${SVG_SIZE/2}" r="${R}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <circle id="cd-arc-${choice.label}" cx="${SVG_SIZE/2}" cy="${SVG_SIZE/2}" r="${R}" fill="none" stroke="#00d4ff" stroke-width="2"
      stroke-dasharray="${CIRC}" stroke-dashoffset="0" transform="rotate(-90 ${SVG_SIZE/2} ${SVG_SIZE/2})"/>
    <text x="${SVG_SIZE/2}" y="${SVG_SIZE/2+4}" text-anchor="middle" fill="#fff" font-size="9" font-family="monospace">${remaining}</text>
  </svg>`;
  btn.style.position = 'relative';
  btn.appendChild(ring);
  const key = choice.label + Math.random();
  countdownTimers[key] = setInterval(() => {
    remaining--;
    const arc = ring.querySelector('circle:last-of-type');
    const txt = ring.querySelector('text');
    if (arc) arc.style.strokeDashoffset = CIRC * (1 - remaining/secs);
    if (txt) txt.textContent = remaining;
    // Red edge when low
    const shell = document.getElementById('phone-shell');
    if (remaining <= 2 && shell) shell.style.boxShadow = `0 0 0 3px rgba(255,59,92,${0.3+(2-remaining)*0.25}) inset`;
    if (remaining <= 0) {
      clearInterval(countdownTimers[key]);
      if (shell) shell.style.boxShadow = '';
      // Execute timeout effects
      if (cd.timeout_effects) executeEffects(cd.timeout_effects, gameData);
      if (cd.timeout_target_node) loadNode(cd.timeout_target_node);
    }
  }, 1000);
}
function clearAllCountdowns() {
  Object.values(countdownTimers).forEach(t => clearInterval(t));
  for (const k in countdownTimers) delete countdownTimers[k];
  const shell = document.getElementById('phone-shell');
  if (shell) shell.style.boxShadow = '';
}

// ── Override showChoices to integrate game engine ─────────────────
const _origShowChoices = showChoices;
showChoices = function(node) {
  // Don't call _origShowChoices — we reimplement with game logic
  if (engine.choiceShown) return;
  engine.choiceShown = true;

  $hotspotLayer.querySelectorAll('.hotspot-btn').forEach(el => el.remove());
  $hotspotSvg.innerHTML = '';

  const gameData = engine.gameData;

  node.choices.forEach((choice, idx) => {
    // Evaluate conditions
    const condResult = evalConditions(choice.conditions);

    if (!condResult.pass && condResult.fail_behavior === 'hidden') return; // Don't render

    if (choice.type === 'polygon' && choice.points && choice.points.length >= 3) {
      // Polygon hotspot (no condition support for now)
      const pts = choice.points.map(p=>`${parseFloat(p.x)},${parseFloat(p.y)}`).join(' ');
      const polygon = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      polygon.setAttribute('points',pts);
      polygon.setAttribute('vector-effect','non-scaling-stroke');
      polygon.classList.add('poly-hotspot');
      polygon.dataset.choiceIdx = idx;
      polygon.dataset.targetNode = choice.target_node||'';
      $hotspotSvg.setAttribute('viewBox','0 0 100 100');
      $hotspotSvg.setAttribute('preserveAspectRatio','none');
      $hotspotSvg.style.pointerEvents='none';
      polygon.addEventListener('click', () => handleChoice(choice));
      $hotspotSvg.appendChild(polygon);
      return;
    }

    const btn = document.createElement('button');
    btn.className = 'hotspot-btn';
    btn.dataset.targetNode = choice.target_node||'';
    btn.dataset.choiceIdx = idx;

    const pos = choice.position||{};
    btn.style.left = pos.x||defaultHotspotX(idx, node.choices.length);
    btn.style.top = pos.y||defaultHotspotY(idx, node.choices.length);

    // Style preset
    if (choice.style_preset && choice.style_preset !== 'normal') {
      btn.classList.add('preset-' + choice.style_preset);
    }

    // Locked state
    const isLocked = !condResult.pass;
    if (isLocked) {
      btn.classList.add('locked');
      btn.innerHTML = `<span class="hs-ready-dot"></span><span class="hs-label">${choice.label||''}</span>`;
      btn.addEventListener('click', () => showGameToast(condResult.fail_message||'条件不满足'));
    } else {
      const preloadedVid = videoPool.get(choice.target_node);
      if (preloadedVid && preloadedVid.readyState>=4) btn.classList.add('is-ready');
      btn.innerHTML = `<span class="hs-ready-dot"></span><span class="hs-label">${choice.label||''}</span>`;
      btn.addEventListener('click', () => handleGameChoice(choice, gameData));
      // Start countdown
      if (choice.countdown && choice.countdown.seconds) {
        startCountdown(btn, choice, gameData);
      }
    }
    $hotspotLayer.appendChild(btn);
  });

  $hotspotLayer.classList.add('visible');
  if (engine.activeVideo) engine.activeVideo.pause();
};

// ── Override handleChoice to add effects ─────────────────────────
function handleGameChoice(choice, gameData) {
  if (engine.transitioning) return;
  clearAllCountdowns();
  // Execute effects
  executeEffects(choice.effects, gameData);
  // Check death after effects
  checkDeathConditions(gameData);
  // If death triggered, don't navigate
  if (document.getElementById('death-screen').classList.contains('visible')) return;
  engine.transitioning = true;
  hideHotspots();
  if (engine.activeVideo) {
    engine.activeVideo.removeEventListener('timeupdate', onTimeUpdate);
    engine.activeVideo.removeEventListener('seeked', onSeeked);
    engine.activeVideo.removeEventListener('ended', onEnded);
  }
  loadNode(choice.target_node);
}

// Override loadNode to handle checkpoints and endings
const _origLoadNode = loadNode;
loadNode = async function(nodeId) {
  clearAllCountdowns();
  await _origLoadNode(nodeId);
  // Check checkpoint
  const gameData = engine.gameData;
  if (!gameData) return;
  const node = gameData.nodes[nodeId];
  if (node && node.is_checkpoint) saveCheckpoint(nodeId, gameData);
  // Check ending
  if (node && node.type==='ending') triggerEnding(node, gameData);
};

function triggerEnding(node, gameData) {
  const gs = gameData.game_settings;
  const endings = (gs&&gs.endings)||[];
  const ending = endings.find(e=>e.node_id===node.id);
  if (ending) {
    gameState.endingsUnlocked.add(ending.id);
    const title = gameData.title||'game';
    localStorage.setItem('gs_endings_'+title, JSON.stringify([...gameState.endingsUnlocked]));
    // Enhance ending screen with rarity + progress
    const total = endings.length;
    const count = gameState.endingsUnlocked.size;
    const badge = ending.rarity==='legendary'?'⭐':ending.rarity==='rare'?'💫':'✅';
    // Append progress info to ending screen
    setTimeout(() => {
      const endingTag = document.getElementById('ending-tag-text');
      if (endingTag) endingTag.textContent = (endingTag.textContent||'ENDING') + ` ${badge}`;
      const descEl = document.getElementById('ending-desc-text');
      if (descEl && gs.show_endings_progress) {
        const prog = document.createElement('div');
        prog.style.cssText='margin-top:10px;font-size:10px;letter-spacing:.15em;color:var(--clr-text-dim);';
        prog.textContent = `结局收集 ${count}/${total}`;
        descEl.after(prog);
      }
    }, 50);
  }
}

// ── Wait for engine.gameData then call gsInit ────────────────────
(function waitForGameData() {
  let attempts = 0;
  const poll = setInterval(function() {
    attempts++;
    if (engine && engine.gameData && engine.gameData.game_settings) {
      clearInterval(poll);
      gsInit(engine.gameData);
    } else if (attempts > 60) {
      clearInterval(poll); // give up after 6s
    }
  }, 100);
})();

// ── DOM injection: HUD bar + panels ──────────────────────────────
(function injectGameDOM() {
  const shell = document.getElementById('phone-shell');
  if (!shell) return;

  // HUD bar
  const hud = document.createElement('div');
  hud.id = 'game-hud';
  hud.innerHTML = '<div id="hud-vars"></div><div id="hud-btns"></div>';
  shell.appendChild(hud);

  // Death screen
  const death = document.createElement('div');
  death.id = 'death-screen';
  death.innerHTML = `
    <div class="death-title">💀 GAME OVER</div>
    <div class="death-msg"></div>
    <button class="death-btn primary" id="death-revive-btn" style="display:none;" onclick="respawnFromCheckpoint(engine.gameData)"></button>
    <button class="death-btn" onclick="openShopPanel()">🛒 去商城购买复活道具</button>
    <button class="death-btn danger" onclick="respawnFromStart(engine.gameData)">🔄 从头重生（清除所有进度）</button>
  `;
  shell.appendChild(death);

  // Slide-up panel overlay
  const overlay = document.createElement('div');
  overlay.id = 'game-panel-overlay';
  overlay.className = 'game-panel-overlay';
  overlay.innerHTML = `
    <div class="game-slide-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span class="gsp-title" id="game-slide-title"></span>
        <button onclick="closeGameSlidePanel()" style="background:none;border:none;color:#4a6070;cursor:pointer;font-size:18px;">✕</button>
      </div>
      <div id="game-slide-content"></div>
    </div>
  `;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeGameSlidePanel(); });
  shell.appendChild(overlay);
})();
</script>
