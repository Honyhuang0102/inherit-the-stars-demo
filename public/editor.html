// ══════════════════════════════════════════════════════════════
// IMMERSIVE SCENE EDITOR — 沉浸式场景编辑引擎
// ══════════════════════════════════════════════════════════════

// 当前处于沉浸模式的节点数据
let immersiveNodeData = null;
// 当前微观工具模式: 'hotspot' | 'trigger'
let microTool = 'hotspot';

/**
 * 计算沉浸屏尺寸：尽量充满 stage，保持 9:16 竖屏比例
 */
function calcImmersiveScreenSize() {
  const stage = document.getElementById('immersive-stage');
  const stageRect = stage.getBoundingClientRect();
  const availH = stageRect.height - 40; // 留出上下边距
  const availW = stageRect.width  - 48; // 留出左右边距

  // 9:16 竖屏
  let h = availH;
  let w = h * 9 / 16;
  if (w > availW) {
    w = availW;
    h = w * 16 / 9;
  }
  return { w: Math.floor(w), h: Math.floor(h) };
}

/**
 * 进入沉浸模式
 */
function enterImmersiveMode() {
  const overlay = document.getElementById('immersive-overlay');
  overlay.classList.add('active');
  document.body.classList.add('immersive-mode');

  // 如果当前有选中节点，同步进入沉浸屏
  if (state.selectedNode && state.gameData) {
    const nodeData = state.gameData.nodes[state.selectedNode];
    if (nodeData) {
      loadImmersiveNode(nodeData);
    }
  }

  // 延迟一帧后计算尺寸（等 overlay 渲染完成）
  requestAnimationFrame(() => {
    resizeImmersiveScreen();
    // 初始化画布缩放平移引擎（每次进入沉浸模式时重新绑定）
    initCanvasZoomPan();
  });

  showToast('沉浸编辑模式 · Ctrl+滚轮缩放 · Space+拖拽平移', 'info');

  // ESC 退出
  document.addEventListener('keydown', onImmersiveKeyDown);
}

/**
 * 退出沉浸模式
 */
function exitImmersiveMode() {
  const overlay = document.getElementById('immersive-overlay');
  overlay.classList.remove('active');
  document.body.classList.remove('immersive-mode');
  document.removeEventListener('keydown', onImmersiveKeyDown);

  // 退出时重置画布变换
  resetCanvasTransform();
  // 清理 3D 模式状态
  const screen3d = document.getElementById('immersive-screen');
  if (screen3d) screen3d.classList.remove('model3d-active', 'model3d-picking');
  model3dPickMode = false;
  if (immersiveModelViewer) {
    immersiveModelViewer.removeEventListener('click', onModelViewerClick);
    immersiveModelViewer = null;
  }

  // 将沉浸屏中的热点位置同步回小预览屏
  if (immersiveNodeData) {
    updatePreviewPanel(immersiveNodeData);
  }
}

function onImmersiveKeyDown(e) {
  if (e.key === 'Escape') exitImmersiveMode();
}

/**
 * 动态调整沉浸屏尺寸
 */
function resizeImmersiveScreen() {
  const screen = document.getElementById('immersive-screen');
  if (!screen) return;
  // 同步 wrapper 尺寸
  const wrapper = document.getElementById('immersive-screen-wrapper');
  const { w, h } = calcImmersiveScreenSize();
  screen.style.width  = w + 'px';
  screen.style.height = h + 'px';
}

// 监听窗口大小变化，自动重计算沉浸屏尺寸
window.addEventListener('resize', () => {
  if (document.getElementById('immersive-overlay').classList.contains('active')) {
    resizeImmersiveScreen();
  }
});

/**
 * 加载节点数据到沉浸屏（双轨分流：video / panorama）
 */
let immersiveModelViewer = null; // model-viewer 元素引用
let model3dPickMode = false;    // 3D 打点模式开关

function loadImmersiveNode(nodeData) {
  immersiveNodeData = nodeData;

  // 更新顶部标题
  document.getElementById('imm-node-name').textContent = nodeData.title || nodeData.id || '';
  document.getElementById('imm-node-label-text').textContent = (nodeData.id || '').toUpperCase();
  document.getElementById('imm-node-title-text').textContent = nodeData.title || '';

  const screen = document.getElementById('immersive-screen');

  if (nodeData.type === '3d_model') {
    // ── 3D 模型模式 ──
    screen.classList.add('model3d-active');
    init3DModelViewer(nodeData);
  } else {
    // ── 2D 视频模式 ──
    screen.classList.remove('model3d-active', 'model3d-picking');
    model3dPickMode = false;
    destroy3DModelViewer();
    renderImmersiveChoices(nodeData);
  }
}

/**
 * 初始化 model-viewer 3D 查看器
 */
function init3DModelViewer(nodeData) {
  destroy3DModelViewer();

  const container = document.getElementById('immersive-3d-container');
  const modelUrl  = nodeData.model_url || '';
  if (!modelUrl) {
    showToast('该节点尚未生成 3D 模型，请先上传图片', 'warn');
    return;
  }

  // 创建 model-viewer 元素
  const mv = document.createElement('model-viewer');
  mv.setAttribute('src', modelUrl);
  mv.setAttribute('alt', nodeData.title || '3D 模型');
  mv.setAttribute('camera-controls', '');
  mv.setAttribute('touch-action', 'pan-y');
  mv.setAttribute('shadow-intensity', '1');
  mv.setAttribute('environment-image', 'neutral');
  mv.setAttribute('exposure', '1');
  if (nodeData.camera_orbit)  mv.setAttribute('camera-orbit', nodeData.camera_orbit);
  if (nodeData.camera_target) mv.setAttribute('camera-target', nodeData.camera_target);

  // 渲染已有 3D 热点（model-viewer slot="hotspot-*"）
  (nodeData.choices || []).forEach((c, i) => {
    if (!c.position) return;
    const btn = document.createElement('button');
    btn.slot = `hotspot-${i}`;
    btn.setAttribute('data-position', c.position);
    btn.setAttribute('data-normal', c.normal || '0 1 0');
    btn.className = 'mv-hotspot-btn';
    btn.textContent = c.label || `热点 ${i+1}`;
    btn.addEventListener('click', () => {
      if (c.target_node) selectNode(c.target_node);
      showToast(`热点: ${c.label} → ${c.target_node || '未设置'}`, 'info');
    });
    mv.appendChild(btn);
  });

  container.appendChild(mv);
  immersiveModelViewer = mv;

  mv.addEventListener('load', () => {
    showToast('3D 模型已加载', 'success');
    document.getElementById('imm-node-title-text').textContent = nodeData.title + ' (3D)';
  });
  mv.addEventListener('error', () => {
    showToast('3D 模型加载失败', 'error');
  });

  // 3D 打点点击监听
  mv.addEventListener('click', onModelViewerClick);
}

/**
 * 销毁 model-viewer 实例
 */
function destroy3DModelViewer() {
  if (immersiveModelViewer) {
    immersiveModelViewer.removeEventListener('click', onModelViewerClick);
    immersiveModelViewer.remove();
    immersiveModelViewer = null;
  }
  model3dPickMode = false;
}

/**
 * 切换 3D 打点模式
 */
function toggle3DPickMode() {
  if (!immersiveModelViewer || !immersiveNodeData) {
    showToast('请先选择一个 3D 模型节点', 'warn');
    return;
  }
  model3dPickMode = !model3dPickMode;
  const screen = document.getElementById('immersive-screen');
  if (model3dPickMode) {
    screen.classList.add('model3d-picking');
    showToast('🎯 点击模型表面放置热点，再次点击按钮退出打点模式', 'info');
  } else {
    screen.classList.remove('model3d-picking');
  }
  const btn = document.getElementById('btn-add-3d-hotspot');
  if (btn) btn.style.background = model3dPickMode ? 'rgba(66,133,244,0.15)' : '';
}

/**
 * model-viewer 点击事件处理（3D 表面精准打点）
 * 使用 positionAndNormalFromPoint(clientX, clientY) API
 */
function onModelViewerClick(e) {
  if (!model3dPickMode || !immersiveNodeData) return;

  const mv = immersiveModelViewer;
  if (!mv || typeof mv.positionAndNormalFromPoint !== 'function') {
    showToast('model-viewer API 未就绪，请稍后重试', 'warn');
    return;
  }

  const result = mv.positionAndNormalFromPoint(e.clientX, e.clientY);
  if (!result) {
    showToast('未命中模型表面，请点击模型上的位置', 'warn');
    return;
  }

  const { position, normal } = result;
  const posStr    = `${position.x.toFixed(4)} ${position.y.toFixed(4)} ${position.z.toFixed(4)}`;
  const normalStr = `${normal.x.toFixed(4)} ${normal.y.toFixed(4)} ${normal.z.toFixed(4)}`;

  const nodeId = immersiveNodeData.id;
  const node   = state.gameData.nodes[nodeId];
  if (!node) return;

  const newChoice = {
    id:          `choice_3d_${Date.now()}`,
    label:       `热点 ${(node.choices || []).length + 1}`,
    sublabel:    '',
    target_node: '',
    hotkey:      String((node.choices || []).length + 1),
    position:    posStr,
    normal:      normalStr,
    timeWindow:  [0, 999]
  };
  if (!node.choices) node.choices = [];
  node.choices.push(newChoice);

  // 退出打点模式
  model3dPickMode = false;
  document.getElementById('immersive-screen').classList.remove('model3d-picking');
  const btn = document.getElementById('btn-add-3d-hotspot');
  if (btn) btn.style.background = '';

  // 重新渲染 3D 查看器（含新热点）
  init3DModelViewer(node);
  updateHotspotCountBadge(node.choices.length);
  showToast(`✓ 热点已打在 (${posStr})`, 'success');

  // 如果 Inspector 当前就是该节点，刷新显示
  const insp = document.getElementById('inspector');
  if (insp.dataset.nodeId === nodeId) openInspector(nodeId);
}

/**
 * 在沉浸屏中渲染所有热点（文字按鈕 + 多边形 SVG）
 * 共享同一份 nodeData 引用，拖拽结果直接写回 JSON
 */
function renderImmersiveChoices(nodeData) {
  const container = document.getElementById('immersive-choices');
  container.innerHTML = '';

  // 清除 SVG 层中已有多边形（保留 poly-preview-line）
  const svg = document.getElementById('polygon-draw-svg');
  svg.querySelectorAll('.poly-zone, .poly-vertex').forEach(el => el.remove());
  svg.classList.remove('has-zones');
  polyState.polygons = [];

  if (!nodeData.choices || !nodeData.choices.length) {
    updateHotspotCountBadge(0);
    return;
  }

  nodeData.choices.forEach((c, i) => {
    if (c.type === 'polygon' && c.points && c.points.length >= 3) {
      // 多边形热点：渲染到 SVG 层
      renderPolygonZone(c, i);
    } else {
      // 文字热点：确保有 position
      if (!c.position) {
        c.position = DEFAULT_HOTSPOT_POSITIONS[i] || { x: '50%', y: `${60 + i * 12}%` };
      }
      const btn = document.createElement('div');
      btn.className = 'screen-choice-btn';
      btn.id = `imm-choice-btn-${i}`;
      btn.dataset.choiceIdx = i;
      btn.style.left = c.position.x;
      btn.style.top  = c.position.y;
      btn.innerHTML = `
        <span class="choice-num">${i + 1}</span>
        <span id="imm-choice-label-${i}">${escHtml(c.label || `选项 ${i+1}`)}</span>
        <span class="drag-handle-icon">⠇</span>
      `;
      container.appendChild(btn);
      // 拖拽引擎使用 immersive-screen 作为坐标参考屏
      initHotspotDragOnScreen(btn, nodeData, i, 'immersive-screen');
      // 点击按鈕同步双头滑块
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        syncRangeSliderToChoice(i);
      });
    }
  });

  // 同步更新小预览区热点数量展示
  updateHotspotCountBadge(nodeData.choices.length);

  // 默认选中第一个 choice 的 timeWindow
  if (nodeData.choices.length > 0) syncRangeSliderToChoice(0);
}

/**
 * 通用热点拖拽引擎：支持任意屏元素作为坐标参考
 * @param {HTMLElement} btn        - 热点按鈕
 * @param {object}      nodeData   - 节点数据（共享引用）
 * @param {number}      choiceIdx  - choice 索引
 * @param {string}      screenId   - 坐标参考屏的 DOM id
 */
function initHotspotDragOnScreen(btn, nodeData, choiceIdx, screenId) {
  let dragging = false;
  let startMouseX, startMouseY;
  let startPctX, startPctY;
  let badge = null;

  btn.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    e.preventDefault();
    dragging = true;
    btn.classList.add('dragging-hotspot');

    const screen = document.getElementById(screenId);
    const rect = screen.getBoundingClientRect();
    startMouseX = e.clientX;
    startMouseY = e.clientY;

    const pos = nodeData.choices[choiceIdx].position;
    startPctX = parseFloat(pos.x);
    startPctY = parseFloat(pos.y);

    badge = document.createElement('div');
    badge.className = 'hotspot-pos-badge';
    badge.textContent = `${Math.round(startPctX)}%, ${Math.round(startPctY)}%`;
    btn.appendChild(badge);

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);

    function onMove(ev) {
      if (!dragging) return;
      const screen = document.getElementById(screenId);
      const rect = screen.getBoundingClientRect();
      const dx = ev.clientX - startMouseX;
      const dy = ev.clientY - startMouseY;
      const newPctX = Math.max(5, Math.min(95, startPctX + (dx / rect.width)  * 100));
      const newPctY = Math.max(5, Math.min(95, startPctY + (dy / rect.height) * 100));
      btn.style.left = newPctX + '%';
      btn.style.top  = newPctY + '%';
      if (badge) badge.textContent = `${Math.round(newPctX)}%, ${Math.round(newPctY)}%`;
      // 实时写回 JSON
      nodeData.choices[choiceIdx].position = {
        x: Math.round(newPctX * 10) / 10 + '%',
        y: Math.round(newPctY * 10) / 10 + '%',
      };
      // 同步小预览屏中对应按鈕位置
      const smallBtn = document.getElementById(`choice-btn-${choiceIdx}`);
      if (smallBtn) {
        smallBtn.style.left = newPctX + '%';
        smallBtn.style.top  = newPctY + '%';
      }
    }

    function onUp() {
      dragging = false;
      btn.classList.remove('dragging-hotspot');
      if (badge) { badge.remove(); badge = null; }
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
      const pos = nodeData.choices[choiceIdx].position;
      showToast(`热点 ${choiceIdx+1} 已定位至 ${pos.x}, ${pos.y}`, 'info');
    }
  });
}

/**
 * 添加文字热点（在沉浸屏中心生成一个新 choice）
 */
function addImmersiveHotspot() {
  if (!immersiveNodeData) {
    showToast('请先选中一个节点', 'error');
    return;
  }
  if (!immersiveNodeData.choices) immersiveNodeData.choices = [];
  const i = immersiveNodeData.choices.length;
  const newChoice = {
    label: `选项 ${i + 1}`,
    target: '',
    position: DEFAULT_HOTSPOT_POSITIONS[i] || { x: '50%', y: `${50 + i * 12}%` },
  };
  immersiveNodeData.choices.push(newChoice);
  renderImmersiveChoices(immersiveNodeData);
  // 同步小预览屏
  updatePreviewPanel(immersiveNodeData);
  showToast(`已添加文字热点 ${i + 1}`, 'success');
}

// ═══════════════════════════════════════════════════════════════
// SVG 多边形绘制工具
// ═══════════════════════════════════════════════════════════════
let polyState = {
  drawing: false,
  vertices: [],       // [{x:pct, y:pct}, ...] 百分比
  svgEl: null,
  previewLine: null,
  vertexEls: [],
  polygons: [],       // 已完成的多边形元素列表
};

/**
 * 启动多边形绘制模式
 */
function addTriggerZone() {
  const screen = document.getElementById('immersive-screen');
  const svg = document.getElementById('polygon-draw-svg');

  if (polyState.drawing) {
    // 已在绘制中，再次点击取消
    cancelPolygonDraw();
    return;
  }

  polyState.drawing = true;
  polyState.vertices = [];
  polyState.vertexEls = [];
  polyState.svgEl = svg;
  polyState.previewLine = document.getElementById('poly-preview-line');

  screen.classList.add('polygon-drawing-mode');
  svg.classList.add('active');

  // 监听屏幕点击事件
  svg.addEventListener('click', onPolygonClick);
  svg.addEventListener('dblclick', onPolygonDblClick);
  svg.addEventListener('mousemove', onPolygonMouseMove);

  // 更新顶部按鈕状态
  const btn = document.getElementById('btn-add-trigger');
  if (btn) { btn.classList.add('active'); btn.title = '点击取消绘制'; }

  showToast('已进入多边形绘制模式，在画面上点击添加顶点', 'info');
}

function onPolygonClick(e) {
  if (!polyState.drawing) return;
  e.stopPropagation();

  // 使用逆变换坐标：相对于 immersive-screen 原始尺寸，不受缩放/平移影响
  const screen = document.getElementById('immersive-screen');
  const screenRect = screen.getBoundingClientRect();
  // 将鼠标坐标从屏幕空间转换回未缩放的画布空间
  const rawX = (e.clientX - screenRect.left) / canvasTransform.scale;
  const rawY = (e.clientY - screenRect.top)  / canvasTransform.scale;
  const xPct = Math.round(rawX / (screenRect.width  / canvasTransform.scale) * 1000) / 10;
  const yPct = Math.round(rawY / (screenRect.height / canvasTransform.scale) * 1000) / 10;

  // 点击起始点闭合（至少 3 个顶点）
  if (polyState.vertices.length >= 3) {
    const first = polyState.vertices[0];
    const dx = xPct - first.x, dy = yPct - first.y;
    if (Math.sqrt(dx*dx + dy*dy) < 4) {
      finishPolygon();
      return;
    }
  }

  // 添加顶点
  polyState.vertices.push({ x: xPct, y: yPct });
  addVertexDot(xPct, yPct, polyState.vertices.length === 1);
  updatePolyPreviewLine();
}

function onPolygonDblClick(e) {
  e.stopPropagation();
  if (polyState.vertices.length >= 3) finishPolygon();
}

function onPolygonMouseMove(e) {
  if (!polyState.drawing || polyState.vertices.length === 0) return;
  // 同样使用逆变换坐标
  const screen = document.getElementById('immersive-screen');
  const screenRect = screen.getBoundingClientRect();
  const rawX = (e.clientX - screenRect.left) / canvasTransform.scale;
  const rawY = (e.clientY - screenRect.top)  / canvasTransform.scale;
  const xPct = rawX / (screenRect.width  / canvasTransform.scale) * 100;
  const yPct = rawY / (screenRect.height / canvasTransform.scale) * 100;

  // 更新预览线（最后一个顶点到鼠标）
  const last = polyState.vertices[polyState.vertices.length - 1];
  const first = polyState.vertices[0];
  let pts = `${last.x},${last.y} ${xPct},${yPct}`;
  if (polyState.vertices.length >= 2) {
    pts += ` ${first.x},${first.y}`;
  }
  polyState.previewLine.setAttribute('points', pts);
}

function addVertexDot(xPct, yPct, isFirst) {
  const svg = polyState.svgEl;
  const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  circle.setAttribute('cx', xPct + '%');
  circle.setAttribute('cy', yPct + '%');
  circle.setAttribute('r', isFirst ? '6' : '4');
  circle.classList.add('poly-vertex');
  if (isFirst) circle.classList.add('first-vertex');
  svg.appendChild(circle);
  polyState.vertexEls.push(circle);
}

function updatePolyPreviewLine() {
  if (polyState.vertices.length < 2) return;
  const pts = polyState.vertices.map(v => `${v.x},${v.y}`).join(' ');
  polyState.previewLine.setAttribute('points', pts);
}

/**
 * 闭合多边形，将其写入 JSON 并渲染
 */
function finishPolygon() {
  if (!polyState.drawing || polyState.vertices.length < 3) return;

  const vertices = [...polyState.vertices];
  cancelPolygonDraw();

  // 将多边形热点写入 JSON
  if (!immersiveNodeData) return;
  const i = immersiveNodeData.choices.length;
  const newChoice = {
    id: `choice_poly_${Date.now()}`,
    label: `隐形触发区 ${i + 1}`,
    sublabel: '',
    target_node: '',
    hotkey: '',
    type: 'polygon',
    points: vertices.map(v => ({ x: v.x + '%', y: v.y + '%' })),
    timeWindow: [0, 30],
  };
  immersiveNodeData.choices.push(newChoice);

  // 渲染到沉浸屏
  renderImmersiveChoices(immersiveNodeData);
  updatePreviewPanel(immersiveNodeData);
  showToast(`多边形触发区已添加（${vertices.length} 个顶点）`, 'success');
}

/**
 * 取消绘制模式
 */
function cancelPolygonDraw() {
  const screen = document.getElementById('immersive-screen');
  const svg = document.getElementById('polygon-draw-svg');

  polyState.drawing = false;
  screen.classList.remove('polygon-drawing-mode');
  svg.classList.remove('active');
  svg.removeEventListener('click', onPolygonClick);
  svg.removeEventListener('dblclick', onPolygonDblClick);
  svg.removeEventListener('mousemove', onPolygonMouseMove);

  // 清除临时顶点圆和预览线
  polyState.vertexEls.forEach(el => el.remove());
  polyState.vertexEls = [];
  polyState.vertices = [];
  if (polyState.previewLine) polyState.previewLine.setAttribute('points', '');

  const btn = document.getElementById('btn-add-trigger');
  if (btn) { btn.classList.remove('active'); btn.title = '添加隐形触发区'; }
}

/**
 * 在沉浸屏中渲染多边形热点
 */
function renderPolygonZone(choice, choiceIdx) {
  const svg = document.getElementById('polygon-draw-svg');
  const points = choice.points.map(p => `${parseFloat(p.x)},${parseFloat(p.y)}`).join(' ');

  const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  polygon.setAttribute('points', points);
  polygon.classList.add('poly-zone');
  polygon.dataset.choiceIdx = choiceIdx;
  polygon.title = choice.label || `隐形触发区 ${choiceIdx + 1}`;
  svg.appendChild(polygon);
  polyState.polygons.push(polygon);

  // 点击选中
  polygon.addEventListener('click', (e) => {
    e.stopPropagation();
    svg.querySelectorAll('.poly-zone').forEach(p => p.classList.remove('selected'));
    polygon.classList.add('selected');
    // 同步选中到双头滑块
    syncRangeSliderToChoice(choiceIdx);
  });

  // 确保 SVG 层可交互（有多边形时始终保持 pointer-events）
  svg.classList.add('has-zones');
}

/**
 * 清空沉浸屏热点
 */
function clearImmersiveChoices() {
  if (!immersiveNodeData) return;
  if (!confirm('确认清空该节点的所有热点？')) return;
  immersiveNodeData.choices = [];
  renderImmersiveChoices(immersiveNodeData);
  updatePreviewPanel(immersiveNodeData);
  showToast('热点已清空', 'info');
}

/**
 * 微观工具切换
 */
function setMicroTool(tool) {
  microTool = tool;
  document.getElementById('micro-btn-hotspot').classList.toggle('active', tool === 'hotspot');
  document.getElementById('micro-btn-trigger').classList.toggle('active', tool === 'trigger');
}

// ═══════════════════════════════════════════════════════════════
// 双头区间滑块
// ═══════════════════════════════════════════════════════════════

// 当前选中的 choice 索引（用于双头滑块绑定）
let selectedChoiceIdx = null;

/**
 * 双头区间滑块输入事件
 * 自动保证 start <= end，并将结果写入 choice.timeWindow
 */
function onRangeSliderInput() {
  const startEl = document.getElementById('micro-tl-start');
  const endEl   = document.getElementById('micro-tl-end');
  let s = parseInt(startEl.value);
  let e = parseInt(endEl.value);

  // 保证 start <= end
  if (s > e) {
    if (document.activeElement === startEl) { s = e; startEl.value = s; }
    else { e = s; endEl.value = e; }
  }

  // 根据滑块总长计算秒数（假设视频总长 = max 属性）
  const maxSec = parseFloat(startEl.max) || 100;
  const startSec = (s / 100 * maxSec);
  const endSec   = (e / 100 * maxSec);

  // 更新显示
  document.getElementById('range-tl-display').textContent =
    startSec.toFixed(1) + 's – ' + endSec.toFixed(1) + 's';

  // 更新填充条颜色
  updateRangeSliderFill(s, e);

  // 写入 JSON
  if (selectedChoiceIdx !== null && immersiveNodeData) {
    const choice = immersiveNodeData.choices[selectedChoiceIdx];
    if (choice) {
      choice.timeWindow = [parseFloat(startSec.toFixed(2)), parseFloat(endSec.toFixed(2))];
    }
  }
}

function updateRangeSliderFill(startVal, endVal) {
  const fill = document.getElementById('range-slider-fill');
  if (!fill) return;
  fill.style.left  = startVal + '%';
  fill.style.width = (endVal - startVal) + '%';
}

/**
 * 将指定 choice 的 timeWindow 同步到双头滑块
 */
function syncRangeSliderToChoice(choiceIdx) {
  if (!immersiveNodeData) return;
  const choice = immersiveNodeData.choices[choiceIdx];
  if (!choice) return;

  selectedChoiceIdx = choiceIdx;
  const tw = choice.timeWindow || [0, 30];
  const maxSec = 100; // 默认视频总长 100s

  const startPct = Math.round(tw[0] / maxSec * 100);
  const endPct   = Math.round(tw[1] / maxSec * 100);

  document.getElementById('micro-tl-start').value = startPct;
  document.getElementById('micro-tl-end').value   = endPct;
  document.getElementById('range-tl-display').textContent =
    tw[0].toFixed(1) + 's – ' + tw[1].toFixed(1) + 's';
  updateRangeSliderFill(startPct, endPct);
}

/**
 * 更新小预览屏热点数量展示
 */
function updateHotspotCountBadge(count) {
  const badge = document.getElementById('preview-hotspot-count');
  if (badge) badge.textContent = count + ' 个热点';
}

// 将 selectNode 中的预览同步到沉浸屏
// 在原有 selectNode 内部调用 updatePreviewPanel 时已自动处理，无需额外拦截

// ── SIDEBAR TOGGLE ─────────────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  function toggleMoreMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('more-menu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  }
  function closeMoreMenu() {
    const menu = document.getElementById('more-menu');
    if (menu) menu.style.display = 'none';
  }
  // Close more menu on outside click
  document.addEventListener('click', function(e) {
    const btn = document.getElementById('tool-more-btn');
    if (btn && !btn.contains(e.target)) closeMoreMenu();
  });

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────────
function initKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); saveData(); return; }
    if (e.key === 'v' || e.key === 'V') setTool('select');
    if (e.key === 'c' || e.key === 'C') setTool('connect');
    if (e.key === 'a' || e.key === 'A') addNode('branching');
    if (e.key === 'f' || e.key === 'F') fitView();
    if (e.key === 'Escape') { closeInspector(); clearSelection(); }
    if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedNode) deleteNode(state.selectedNode);
    if (e.key === '+' || e.key === '=') zoomIn();
    if (e.key === '-') zoomOut();
    if (e.key === '0') resetZoom();
  });
}

// ── TOAST ──────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const icons = { success:'✓', error:'✕', info:'·' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${escHtml(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── UTILS ──────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// CSS spin animation for save button
const style = document.createElement('style');
style.textContent = '@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}';
document.head.appendChild(style);

// ══════════════════════════════════════════════════════════════════════════════
//  CANVAS ZOOM & PAN ENGINE  (沉浸式编辑器画布缩放平移)
//
//  缩放：Ctrl/Cmd + 滚轮，以鼠标指针为中心
//  平移：按住 Space + 拖拽，或鼠标中键拖拽
//  坐标系保护：多边形绘制时使用 canvasTransform 逆变换确保 % 坐标精准
// ══════════════════════════════════════════════════════════════════════════════

const canvasTransform = {
  scale:  1,
  tx:     0,   // translate X (px)
  ty:     0,   // translate Y (px)
  minScale: 0.5,
  maxScale: 5,
};

let _zoomIndicatorTimer = null;
let _spaceDown = false;
let _panActive = false;
let _panStartX = 0, _panStartY = 0;
let _panStartTx = 0, _panStartTy = 0;

function applyCanvasTransform() {
  const el = document.getElementById('immersive-canvas-transform');
  if (!el) return;
  el.style.transform = `translate(${canvasTransform.tx}px, ${canvasTransform.ty}px) scale(${canvasTransform.scale})`;
}

function showZoomIndicator() {
  const el = document.getElementById('zoom-indicator');
  if (!el) return;
  el.textContent = Math.round(canvasTransform.scale * 100) + '%';
  el.classList.add('visible');
  clearTimeout(_zoomIndicatorTimer);
  _zoomIndicatorTimer = setTimeout(() => el.classList.remove('visible'), 1200);
}

function resetCanvasTransform() {
  canvasTransform.scale = 1;
  canvasTransform.tx = 0;
  canvasTransform.ty = 0;
  applyCanvasTransform();
  showZoomIndicator();
}

function initCanvasZoomPan() {
  const wrapper = document.getElementById('immersive-screen-wrapper');
  if (!wrapper) return;

  // ── Ctrl + Wheel → Zoom ──────────────────────────────────────────────────
  wrapper.addEventListener('wheel', (e) => {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    e.stopPropagation();

    const rect = wrapper.getBoundingClientRect();
    // 鼠标相对于 wrapper 的位置
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const delta = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.max(canvasTransform.minScale,
                     Math.min(canvasTransform.maxScale,
                     canvasTransform.scale * delta));

    // 以鼠标为中心缩放：调整 translate 使鼠标指向的内容点不变
    const scaleRatio = newScale / canvasTransform.scale;
    canvasTransform.tx = mx - scaleRatio * (mx - canvasTransform.tx);
    canvasTransform.ty = my - scaleRatio * (my - canvasTransform.ty);
    canvasTransform.scale = newScale;

    applyCanvasTransform();
    showZoomIndicator();
  }, { passive: false });

  // ── Space key → Pan mode ─────────────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && document.getElementById('immersive-overlay')?.classList.contains('visible')) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      _spaceDown = true;
      wrapper.classList.add('panning');
      const hint = document.getElementById('pan-hint');
      if (hint) hint.classList.add('visible');
    }
    // Escape → reset zoom
    if (e.code === 'Escape' && canvasTransform.scale !== 1) {
      resetCanvasTransform();
    }
  });

  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      _spaceDown = false;
      if (!_panActive) wrapper.classList.remove('panning');
      const hint = document.getElementById('pan-hint');
      if (hint) hint.classList.remove('visible');
    }
  });

  // ── Mouse events → Pan drag ──────────────────────────────────────────────
  wrapper.addEventListener('mousedown', (e) => {
    // Space + left button OR middle button
    if ((_spaceDown && e.button === 0) || e.button === 1) {
      e.preventDefault();
      _panActive = true;
      _panStartX = e.clientX;
      _panStartY = e.clientY;
      _panStartTx = canvasTransform.tx;
      _panStartTy = canvasTransform.ty;
      wrapper.classList.add('panning');
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!_panActive) return;
    const dx = e.clientX - _panStartX;
    const dy = e.clientY - _panStartY;
    canvasTransform.tx = _panStartTx + dx;
    canvasTransform.ty = _panStartTy + dy;
    applyCanvasTransform();
  });

  document.addEventListener('mouseup', (e) => {
    if (_panActive) {
      _panActive = false;
      if (!_spaceDown) wrapper.classList.remove('panning');
    }
  });

  // ── Double-click → Reset zoom ────────────────────────────────────────────
  wrapper.addEventListener('dblclick', (e) => {
    if (e.ctrlKey || e.metaKey) {
      resetCanvasTransform();
    }
  });

  console.log('[ZoomPan] Canvas zoom/pan engine initialized');
}

// 在 enterImmersiveMode 之后调用 initCanvasZoomPan
// 在 exitImmersiveMode 之前调用 resetCanvasTransform
