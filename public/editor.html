<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stellar Heir · 创作者编辑器</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand:  { DEFAULT: '#6366f1', light: '#818cf8', dark: '#4f46e5' },
            surface: '#1e1e2e',
            base:    '#13131f',
            border:  '#2e2e45',
            muted:   '#6b7280',
          },
          fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'Courier New', 'monospace'] },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #e2e8f0; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2e2e45; border-radius: 3px; }

    /* ── Node Card ── */
    .node-card {
      background: #1a1a2e;
      border: 1px solid #2e2e45;
      border-radius: 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .node-card:hover { border-color: #6366f1; box-shadow: 0 0 0 1px #6366f120; }
    .node-card.node-branching { border-left: 3px solid #6366f1; }
    .node-card.node-ending    { border-left: 3px solid #10b981; }

    /* ── Badge ── */
    .badge-branching { background: #6366f120; color: #818cf8; border: 1px solid #6366f140; }
    .badge-ending    { background: #10b98120; color: #34d399; border: 1px solid #10b98140; }

    /* ── Input ── */
    .field-input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #2e2e45;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e2e8f0;
      font-size: 13px;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px #6366f120;
    }
    .field-input::placeholder { color: #4b5563; }

    /* ── Choice Row ── */
    .choice-row {
      background: #13131f;
      border: 1px solid #2e2e45;
      border-radius: 8px;
      padding: 12px;
      position: relative;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #10b981; color: #fff; }
    #toast.error   { background: #ef4444; color: #fff; }
    #toast.info    { background: #6366f1; color: #fff; }

    /* ── Drag handle ── */
    .drag-handle { cursor: grab; color: #4b5563; }
    .drag-handle:active { cursor: grabbing; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, #1a1a2e 25%, #2e2e45 50%, #1a1a2e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Pulse dot ── */
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #10b98140; }
      50%       { opacity: 0.7; box-shadow: 0 0 0 6px transparent; }
    }

    /* ── Confirm modal ── */
    #confirm-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    #confirm-modal.open { display: flex; }
  </style>
</head>
<body class="min-h-screen">

<!-- ── Navbar ──────────────────────────────────────────────────────────────── -->
<nav class="sticky top-0 z-50 border-b border-[#2e2e45] bg-[#0f0f1a]/90 backdrop-blur-md">
  <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-lg bg-brand flex items-center justify-center text-white text-xs font-bold">SH</div>
      <span class="font-semibold text-sm text-white">Stellar Heir</span>
      <span class="text-[#4b5563] text-sm">·</span>
      <span class="text-[#6b7280] text-sm">创作者编辑器</span>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-3">
      <!-- Server status -->
      <div class="flex items-center gap-2 text-xs text-[#6b7280]" id="server-status">
        <div class="w-2 h-2 rounded-full bg-[#4b5563]"></div>
        <span>连接中…</span>
      </div>

      <!-- Player link -->
      <a href="/" target="_blank"
         class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-[#2e2e45] text-xs text-[#9ca3af] hover:text-white hover:border-[#6366f1] transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        玩家端预览
      </a>

      <!-- Save button -->
      <button id="save-btn" onclick="saveData()"
              class="flex items-center gap-2 px-4 py-1.5 rounded-lg bg-brand hover:bg-brand-dark text-white text-sm font-medium transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
        </svg>
        <span id="save-btn-text">保存并发布</span>
      </button>
    </div>
  </div>
</nav>

<!-- ── Main Layout ──────────────────────────────────────────────────────────── -->
<div class="max-w-6xl mx-auto px-6 py-8">

  <!-- Page Header -->
  <div class="mb-8">
    <h1 class="text-2xl font-bold text-white mb-1">互动节点编辑器</h1>
    <p class="text-sm text-[#6b7280]">修改各节点的视频链接、分支时间点和选项配置，点击「保存并发布」即时生效。</p>
  </div>

  <!-- Meta Panel -->
  <div class="node-card p-5 mb-6" id="meta-panel">
    <div class="flex items-center gap-2 mb-4">
      <svg class="w-4 h-4 text-[#6366f1]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <h2 class="text-sm font-semibold text-white">全局配置</h2>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">游戏标题</label>
        <input id="meta-title" type="text" class="field-input" placeholder="游戏标题" />
      </div>
      <div>
        <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">起始节点 ID</label>
        <input id="meta-start-node" type="text" class="field-input font-mono" placeholder="node_A" />
      </div>
    </div>
  </div>

  <!-- Nodes Container -->
  <div id="nodes-container" class="space-y-5">
    <!-- Skeleton loading state -->
    <div id="skeleton-loader" class="space-y-5">
      <div class="node-card p-5">
        <div class="skeleton h-4 w-24 mb-4"></div>
        <div class="skeleton h-9 w-full mb-3"></div>
        <div class="skeleton h-9 w-3/4"></div>
      </div>
      <div class="node-card p-5">
        <div class="skeleton h-4 w-24 mb-4"></div>
        <div class="skeleton h-9 w-full mb-3"></div>
        <div class="skeleton h-9 w-1/2"></div>
      </div>
    </div>
  </div>

  <!-- Add Node Button -->
  <button onclick="addNode()"
          class="mt-5 w-full py-3 rounded-xl border border-dashed border-[#2e2e45] text-[#6b7280] text-sm
                 hover:border-[#6366f1] hover:text-[#818cf8] hover:bg-[#6366f108] transition-all flex items-center justify-center gap-2">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
    </svg>
    添加新节点
  </button>

  <!-- Bottom spacer -->
  <div class="h-20"></div>
</div>

<!-- ── Confirm Modal ────────────────────────────────────────────────────────── -->
<div id="confirm-modal">
  <div class="bg-[#1a1a2e] border border-[#2e2e45] rounded-2xl p-6 w-80 mx-4">
    <h3 class="text-white font-semibold mb-2" id="modal-title">确认操作</h3>
    <p class="text-[#9ca3af] text-sm mb-5" id="modal-body">确定要执行此操作吗？</p>
    <div class="flex gap-3 justify-end">
      <button onclick="closeModal()"
              class="px-4 py-2 rounded-lg border border-[#2e2e45] text-[#9ca3af] text-sm hover:text-white transition-colors">
        取消
      </button>
      <button id="modal-confirm-btn"
              class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium transition-colors">
        确认删除
      </button>
    </div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── JSON Preview Panel (collapsible) ────────────────────────────────────── -->
<div class="fixed bottom-0 left-0 right-0 z-40" id="json-panel">
  <div class="max-w-6xl mx-auto px-6">
    <div class="bg-[#1a1a2e] border border-[#2e2e45] border-b-0 rounded-t-xl overflow-hidden">
      <button onclick="toggleJsonPanel()"
              class="w-full px-5 py-3 flex items-center justify-between text-xs text-[#6b7280] hover:text-white hover:bg-[#ffffff08] transition-colors">
        <div class="flex items-center gap-2">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
          </svg>
          <span>JSON 预览</span>
        </div>
        <svg id="json-panel-chevron" class="w-3.5 h-3.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="json-panel-body" class="hidden px-5 pb-4">
        <pre id="json-preview"
             class="text-xs text-[#9ca3af] font-mono overflow-auto max-h-48 leading-relaxed"></pre>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     JavaScript Engine
═══════════════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
let gameData = null;          // 当前内存中的完整 JSON 数据
let pendingDeleteNodeId = null;

// ── DOM Refs ───────────────────────────────────────────────────────────────────
const $nodesContainer = document.getElementById('nodes-container');
const $skeletonLoader = document.getElementById('skeleton-loader');
const $metaTitle      = document.getElementById('meta-title');
const $metaStartNode  = document.getElementById('meta-start-node');
const $jsonPreview    = document.getElementById('json-preview');
const $saveBtn        = document.getElementById('save-btn');
const $saveBtnText    = document.getElementById('save-btn-text');
const $serverStatus   = document.getElementById('server-status');

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = 'info') {
  const $t = document.getElementById('toast');
  $t.textContent = msg;
  $t.className   = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { $t.className = type; }, 3000);
}

// ── Server Status ──────────────────────────────────────────────────────────────
function setServerStatus(online) {
  $serverStatus.innerHTML = online
    ? `<div class="pulse-dot"></div><span class="text-xs text-[#10b981]">服务在线</span>`
    : `<div class="w-2 h-2 rounded-full bg-red-500"></div><span class="text-xs text-red-400">服务离线</span>`;
}

// ── Fetch Game Data ────────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const res = await fetch('/api/game-data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    gameData = await res.json();
    setServerStatus(true);
    renderAll();
  } catch (err) {
    setServerStatus(false);
    $skeletonLoader.innerHTML = `
      <div class="node-card p-8 text-center">
        <div class="text-red-400 text-sm mb-2">⚠ 无法加载游戏数据</div>
        <div class="text-[#6b7280] text-xs">${err.message}</div>
        <button onclick="fetchData()" class="mt-4 px-4 py-2 rounded-lg bg-[#2e2e45] text-sm text-white hover:bg-[#3e3e55] transition-colors">
          重试
        </button>
      </div>`;
    showToast('加载失败：' + err.message, 'error');
  }
}

// ── Render All ─────────────────────────────────────────────────────────────────
function renderAll() {
  if (!gameData) return;

  // Meta
  $metaTitle.value     = gameData.title     || '';
  $metaStartNode.value = gameData.start_node || '';

  // Remove skeleton
  $skeletonLoader.remove();

  // Clear existing node cards (keep skeleton ref)
  $nodesContainer.querySelectorAll('.node-card[data-node-id]').forEach(el => el.remove());

  // Render each node
  Object.keys(gameData.nodes).forEach(nodeId => {
    renderNodeCard(nodeId, gameData.nodes[nodeId]);
  });

  updateJsonPreview();
}

// ── Render Node Card ───────────────────────────────────────────────────────────
function renderNodeCard(nodeId, node) {
  const isBranching = node.type === 'branching';
  const card = document.createElement('div');
  card.className = `node-card node-${node.type} p-5`;
  card.dataset.nodeId = nodeId;

  card.innerHTML = `
    <!-- Card Header -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <span class="font-mono text-sm font-bold text-white">${escHtml(nodeId)}</span>
        <span class="badge-${node.type} text-xs px-2 py-0.5 rounded-full font-medium">
          ${isBranching ? '⑂ 分支节点' : '⏹ 结局节点'}
        </span>
        ${nodeId === gameData.start_node
          ? '<span class="bg-amber-500/20 text-amber-400 border border-amber-500/40 text-xs px-2 py-0.5 rounded-full">起始</span>'
          : ''}
      </div>
      <div class="flex items-center gap-2">
        <button onclick="toggleNodeType('${escAttr(nodeId)}')"
                title="切换节点类型"
                class="p-1.5 rounded-lg text-[#6b7280] hover:text-white hover:bg-[#2e2e45] transition-colors text-xs">
          切换类型
        </button>
        <button onclick="confirmDeleteNode('${escAttr(nodeId)}')"
                title="删除节点"
                class="p-1.5 rounded-lg text-[#6b7280] hover:text-red-400 hover:bg-red-500/10 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Node ID (editable) -->
    <div class="mb-4">
      <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">节点 ID</label>
      <input type="text" class="field-input font-mono"
             value="${escHtml(nodeId)}"
             data-field="id"
             onchange="renameNode('${escAttr(nodeId)}', this.value)"
             placeholder="node_A" />
      <p class="text-xs text-[#4b5563] mt-1">修改 ID 后将同步更新所有引用此节点的 choices</p>
    </div>

    <!-- Video URL -->
    <div class="mb-4">
      <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">视频链接 (video_url)</label>
      <div class="flex gap-2">
        <input type="url" class="field-input"
               value="${escHtml(node.video_url || '')}"
               data-field="video_url"
               onchange="updateNodeField('${escAttr(nodeId)}', 'video_url', this.value)"
               placeholder="https://example.com/video.mp4" />
        <button onclick="previewVideo('${escAttr(nodeId)}')"
                title="预览视频"
                class="flex-shrink-0 px-3 py-2 rounded-lg border border-[#2e2e45] text-[#6b7280] hover:text-white hover:border-[#6366f1] transition-colors text-xs whitespace-nowrap">
          预览
        </button>
      </div>
    </div>

    <!-- Title (for ending nodes) -->
    <div class="mb-4">
      <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">节点标题</label>
      <input type="text" class="field-input"
             value="${escHtml(node.title || '')}"
             data-field="title"
             onchange="updateNodeField('${escAttr(nodeId)}', 'title', this.value)"
             placeholder="节点标题（结局节点显示用）" />
    </div>

    ${isBranching ? renderBranchingFields(nodeId, node) : renderEndingFields(nodeId, node)}
  `;

  $nodesContainer.appendChild(card);
}

// ── Branching Fields ───────────────────────────────────────────────────────────
function renderBranchingFields(nodeId, node) {
  const choices = node.choices || [];
  return `
    <!-- Branch At Second -->
    <div class="mb-5">
      <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">
        分支触发时间 (branch_at_second)
        <span class="text-[#4b5563] font-normal ml-1">— 视频播放到第几秒弹出选项</span>
      </label>
      <div class="flex items-center gap-3">
        <input type="number" min="0" step="0.5" class="field-input w-32"
               value="${node.branch_at_second ?? 5}"
               onchange="updateNodeField('${escAttr(nodeId)}', 'branch_at_second', parseFloat(this.value))"
               placeholder="5" />
        <span class="text-xs text-[#6b7280]">秒</span>
      </div>
    </div>

    <!-- Choices -->
    <div>
      <div class="flex items-center justify-between mb-3">
        <label class="text-xs text-[#6b7280] font-medium">选项列表 (choices)</label>
        <button onclick="addChoice('${escAttr(nodeId)}')"
                class="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-[#6366f120] text-[#818cf8] text-xs hover:bg-[#6366f130] transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
          添加选项
        </button>
      </div>
      <div id="choices-${escAttr(nodeId)}" class="space-y-3">
        ${choices.map((c, i) => renderChoiceRow(nodeId, c, i)).join('')}
      </div>
    </div>
  `;
}

// ── Ending Fields ──────────────────────────────────────────────────────────────
function renderEndingFields(nodeId, node) {
  return `
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">结局标签 (ending_tag)</label>
        <input type="text" class="field-input"
               value="${escHtml(node.ending_tag || '')}"
               onchange="updateNodeField('${escAttr(nodeId)}', 'ending_tag', this.value)"
               placeholder="ENDING · 01" />
      </div>
      <div>
        <label class="block text-xs text-[#6b7280] mb-1.5 font-medium">结局描述 (description)</label>
        <input type="text" class="field-input"
               value="${escHtml(node.description || '')}"
               onchange="updateNodeField('${escAttr(nodeId)}', 'description', this.value)"
               placeholder="结局描述文字" />
      </div>
    </div>
  `;
}

// ── Choice Row ─────────────────────────────────────────────────────────────────
function renderChoiceRow(nodeId, choice, index) {
  return `
    <div class="choice-row" data-choice-index="${index}">
      <div class="flex items-start gap-3">
        <div class="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div>
            <label class="block text-xs text-[#6b7280] mb-1 font-medium">选项标签</label>
            <input type="text" class="field-input"
                   value="${escHtml(choice.label || '')}"
                   onchange="updateChoice('${escAttr(nodeId)}', ${index}, 'label', this.value)"
                   placeholder="选项文字" />
          </div>
          <div>
            <label class="block text-xs text-[#6b7280] mb-1 font-medium">目标节点 ID</label>
            <input type="text" class="field-input font-mono"
                   value="${escHtml(choice.target_node || '')}"
                   onchange="updateChoice('${escAttr(nodeId)}', ${index}, 'target_node', this.value)"
                   placeholder="node_B" />
          </div>
          <div>
            <label class="block text-xs text-[#6b7280] mb-1 font-medium">副标签 (sublabel)</label>
            <input type="text" class="field-input"
                   value="${escHtml(choice.sublabel || '')}"
                   onchange="updateChoice('${escAttr(nodeId)}', ${index}, 'sublabel', this.value)"
                   placeholder="选项说明文字" />
          </div>
          <div>
            <label class="block text-xs text-[#6b7280] mb-1 font-medium">快捷键 (hotkey)</label>
            <input type="text" class="field-input w-20 font-mono"
                   value="${escHtml(choice.hotkey || '')}"
                   maxlength="1"
                   onchange="updateChoice('${escAttr(nodeId)}', ${index}, 'hotkey', this.value)"
                   placeholder="1" />
          </div>
        </div>
        <button onclick="removeChoice('${escAttr(nodeId)}', ${index})"
                title="删除此选项"
                class="mt-5 p-1.5 rounded-lg text-[#6b7280] hover:text-red-400 hover:bg-red-500/10 transition-colors flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  `;
}

// ── Data Mutation Helpers ──────────────────────────────────────────────────────
function updateNodeField(nodeId, field, value) {
  if (!gameData.nodes[nodeId]) return;
  gameData.nodes[nodeId][field] = value;
  updateJsonPreview();
}

function updateChoice(nodeId, index, field, value) {
  const choices = gameData.nodes[nodeId]?.choices;
  if (!choices || !choices[index]) return;
  choices[index][field] = value;
  updateJsonPreview();
}

function addChoice(nodeId) {
  const node = gameData.nodes[nodeId];
  if (!node) return;
  if (!node.choices) node.choices = [];
  const newIndex = node.choices.length;
  node.choices.push({
    label:       '新选项',
    sublabel:    '选项说明',
    hotkey:      String(newIndex + 1),
    target_node: '',
  });
  // Re-render choices section only
  const $choicesEl = document.getElementById(`choices-${nodeId}`);
  if ($choicesEl) {
    $choicesEl.innerHTML = node.choices.map((c, i) => renderChoiceRow(nodeId, c, i)).join('');
  }
  updateJsonPreview();
  showToast('已添加新选项', 'info');
}

function removeChoice(nodeId, index) {
  const node = gameData.nodes[nodeId];
  if (!node?.choices) return;
  node.choices.splice(index, 1);
  const $choicesEl = document.getElementById(`choices-${nodeId}`);
  if ($choicesEl) {
    $choicesEl.innerHTML = node.choices.map((c, i) => renderChoiceRow(nodeId, c, i)).join('');
  }
  updateJsonPreview();
}

function toggleNodeType(nodeId) {
  const node = gameData.nodes[nodeId];
  if (!node) return;
  node.type = node.type === 'branching' ? 'ending' : 'branching';
  if (node.type === 'branching' && !node.choices) {
    node.choices = [];
    node.branch_at_second = 5;
  }
  // Re-render this card
  const $card = $nodesContainer.querySelector(`[data-node-id="${nodeId}"]`);
  if ($card) $card.remove();
  renderNodeCard(nodeId, node);
  updateJsonPreview();
  showToast(`节点 ${nodeId} 已切换为 ${node.type}`, 'info');
}

function renameNode(oldId, newId) {
  newId = newId.trim();
  if (!newId || newId === oldId) return;
  if (gameData.nodes[newId]) {
    showToast(`节点 ID "${newId}" 已存在`, 'error');
    return;
  }

  // Move node
  gameData.nodes[newId] = gameData.nodes[oldId];
  delete gameData.nodes[oldId];

  // Update start_node if needed
  if (gameData.start_node === oldId) {
    gameData.start_node = newId;
    $metaStartNode.value = newId;
  }

  // Update all choices referencing oldId
  Object.values(gameData.nodes).forEach(node => {
    (node.choices || []).forEach(c => {
      if (c.target_node === oldId) c.target_node = newId;
    });
  });

  // Re-render
  const $card = $nodesContainer.querySelector(`[data-node-id="${oldId}"]`);
  if ($card) $card.remove();
  renderNodeCard(newId, gameData.nodes[newId]);
  updateJsonPreview();
  showToast(`节点 ID 已重命名：${oldId} → ${newId}`, 'info');
}

function addNode() {
  const id = `node_${Date.now()}`;
  gameData.nodes[id] = {
    id,
    type:             'ending',
    title:            '新节点',
    video_url:        '',
    ending_tag:       'ENDING',
    description:      '',
  };
  renderNodeCard(id, gameData.nodes[id]);
  updateJsonPreview();
  // Scroll to new card
  setTimeout(() => {
    const $card = $nodesContainer.querySelector(`[data-node-id="${id}"]`);
    if ($card) $card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
  showToast(`已添加节点 ${id}`, 'info');
}

// ── Confirm Delete ─────────────────────────────────────────────────────────────
function confirmDeleteNode(nodeId) {
  pendingDeleteNodeId = nodeId;
  document.getElementById('modal-title').textContent = `删除节点 "${nodeId}"`;
  document.getElementById('modal-body').textContent  = '此操作不可撤销，确定要删除该节点吗？';
  document.getElementById('confirm-modal').classList.add('open');
}

function closeModal() {
  pendingDeleteNodeId = null;
  document.getElementById('confirm-modal').classList.remove('open');
}

document.getElementById('modal-confirm-btn').addEventListener('click', () => {
  if (!pendingDeleteNodeId) return;
  const nodeId = pendingDeleteNodeId;
  delete gameData.nodes[nodeId];
  const $card = $nodesContainer.querySelector(`[data-node-id="${nodeId}"]`);
  if ($card) $card.remove();
  updateJsonPreview();
  closeModal();
  showToast(`节点 ${nodeId} 已删除`, 'info');
});

// ── Preview Video ──────────────────────────────────────────────────────────────
function previewVideo(nodeId) {
  const url = gameData.nodes[nodeId]?.video_url;
  if (!url) { showToast('请先填写视频链接', 'error'); return; }
  window.open(url, '_blank', 'noopener');
}

// ── Meta field sync ────────────────────────────────────────────────────────────
$metaTitle.addEventListener('input', () => {
  if (gameData) { gameData.title = $metaTitle.value; updateJsonPreview(); }
});
$metaStartNode.addEventListener('input', () => {
  if (gameData) { gameData.start_node = $metaStartNode.value; updateJsonPreview(); }
});

// ── JSON Preview ───────────────────────────────────────────────────────────────
function updateJsonPreview() {
  if (!gameData) return;
  $jsonPreview.textContent = JSON.stringify(gameData, null, 2);
}

function toggleJsonPanel() {
  const $body    = document.getElementById('json-panel-body');
  const $chevron = document.getElementById('json-panel-chevron');
  const isHidden = $body.classList.contains('hidden');
  $body.classList.toggle('hidden', !isHidden);
  $chevron.style.transform = isHidden ? 'rotate(180deg)' : '';
  if (isHidden) updateJsonPreview();
}

// ── Save Data ──────────────────────────────────────────────────────────────────
async function saveData() {
  if (!gameData) { showToast('数据尚未加载', 'error'); return; }

  // Sync meta fields
  gameData.title      = $metaTitle.value.trim()     || gameData.title;
  gameData.start_node = $metaStartNode.value.trim() || gameData.start_node;

  // Validate start_node
  if (!gameData.nodes[gameData.start_node]) {
    showToast(`起始节点 "${gameData.start_node}" 不存在，请检查`, 'error');
    return;
  }

  // Disable button
  $saveBtn.disabled    = true;
  $saveBtnText.textContent = '保存中…';

  try {
    const res = await fetch('/api/save-data', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(gameData),
    });
    const json = await res.json();

    if (!res.ok || !json.ok) {
      throw new Error(json.error || `HTTP ${res.status}`);
    }

    showToast(`✓ 保存成功 · ${new Date(json.timestamp).toLocaleTimeString()}`, 'success');
    $saveBtnText.textContent = '已保存 ✓';
    setTimeout(() => { $saveBtnText.textContent = '保存并发布'; }, 2500);
  } catch (err) {
    showToast('保存失败：' + err.message, 'error');
    $saveBtnText.textContent = '保存并发布';
  } finally {
    $saveBtn.disabled = false;
  }
}

// ── Keyboard shortcut: Ctrl/Cmd + S ───────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveData();
  }
});

// ── Escape closes modal ────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── XSS Helpers ───────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

// ── Init ───────────────────────────────────────────────────────────────────────
fetchData();
</script>
</body>
</html>
